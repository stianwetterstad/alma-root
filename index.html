<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>Alma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#f0f7ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Alma" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Arial, sans-serif;
      background: #f0f7ff;
      text-align: center;
      color: #102a43;
    }

    h1 {
      font-size: 3rem;
      margin-top: 2rem;
    }

    p {
      font-size: 1.4rem;
      margin-bottom: 2rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      max-width: 720px;
      margin: 0 auto;
      padding: 1rem;
    }

    .button {
      display: block;
      padding: 2rem 1.5rem;
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 20px;
      color: white;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
      transition: transform 0.1s ease;
    }

    .button:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }

    .ukelonn {
      background: #22c55e;
    }

    .spill {
      background: #3b82f6;
    }

    .tur {
      background: #0ea5a6;
    }

    .laering {
      background: #f97316;
    }

    .ki-promo {
      display: inline-block;
      margin: 1.5rem auto 0;
      max-width: min(92vw, 640px);
      text-decoration: none;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.12);
      border: 4px solid white;
      background: white;
    }

    .ki-promo img {
      display: block;
      width: 100%;
      height: auto;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #486581;
    }
  </style>
</head>

<body>
  <h1>Hei Alma 👋</h1>
  <p>Velg hva du vil gjøre</p>

  <div class="buttons">
    <a class="button ukelonn" href="/ukelonn/">
      💰 Ukelønn
    </a>

    <a class="button spill" href="/spill/">
      🎮 Spill
    </a>

    <a class="button tur" href="/tur/">
      🚲 Tur
    </a>

    <a class="button laering" href="/laering/">
      📘 Læring
    </a>
  </div>

  <a class="ki-promo" href="/laering/ki/" aria-label="Gå til KI-siden">
    <img src="/laering/assets/lagetavkimedfork.png" alt="Laget av KI med forklaring" />
  </a>

  <footer>
    Laget av pappa <a href="https://stianwetterstad.github.io/ukelonn/parent/" style="color: inherit; text-decoration: none;" title="Forelder-innlogging">❤️</a>
  </footer>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
