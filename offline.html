<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>Du er offline - Alma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f0f7ff" />
  
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Arial, sans-serif;
      background: #f0f7ff;
      text-align: center;
      color: #102a43;
      padding: 1rem;
    }

    h1 {
      font-size: 3rem;
      margin-top: 3rem;
      margin-bottom: 2rem;
    }

    p {
      font-size: 1.4rem;
      margin-bottom: 2rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    a {
      display: inline-block;
      padding: 2rem 2rem;
      font-size: 1.8rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 20px;
      color: white;
      background: #3b82f6;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15);
      transition: transform 0.1s ease;
    }

    a:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>
  <h1>Du er offline</h1>
  <p>Det ser ut som internett ikke virker akkurat nå. Prøv igjen litt senere.</p>
  <a href="/">Prøv igjen</a>
</body>
</html>
