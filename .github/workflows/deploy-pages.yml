name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site/laering/gangetrappen site/spill/kosekaos
          git archive --format=tar HEAD | tar -xf - -C site

      - name: Inject Firebase config
        shell: bash
        env:
          ALMA_FIREBASE_CONFIG_JS: ${{ secrets.ALMA_FIREBASE_CONFIG_JS }}
        run: |
          set -euo pipefail
          if [ -z "${ALMA_FIREBASE_CONFIG_JS}" ]; then
            echo "⚠ Warning: ALMA_FIREBASE_CONFIG_JS secret not set, Firebase will be disabled" >&2
          else
            printf '%s\n' "$ALMA_FIREBASE_CONFIG_JS" > site/laering/gangetrappen/firebase-config.js
            printf '%s\n' "$ALMA_FIREBASE_CONFIG_JS" > site/spill/kosekaos/firebase-config.js
            echo "✓ Firebase config injected for gangetrappen and kosekaos"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
