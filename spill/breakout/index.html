<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Breakout | Alma.rocks</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @keyframes neonGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(0, 245, 255, 0.6); }
      50% { box-shadow: 0 0 30px rgba(0, 245, 255, 0.9), inset 0 0 15px rgba(0, 245, 255, 0.2); }
    }
    @keyframes pulsePink {
      0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.5); }
      50% { box-shadow: 0 0 40px rgba(255, 0, 110, 0.8), inset 0 0 15px rgba(255, 0, 110, 0.2); }
    }
    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    :root{
      --neon-pink: #ff006e;
      --neon-cyan: #00f5ff;
      --neon-yellow: #ffff00;
      --neon-purple: #b537f2;
      --neon-green: #39ff14;
      --bg: #0a0e27;
      --text: #ffffff;
      --muted: #a0aec0;
      --border: rgba(0, 245, 255, 0.3);
      --btnbg: rgba(0, 245, 255, 0.1);
    }

    body{
      margin: 0;
      background: linear-gradient(45deg, rgba(255, 0, 110, 0.05) 1px, transparent 1px),
                  linear-gradient(-45deg, rgba(0, 245, 255, 0.05) 1px, transparent 1px),
                  #0a0e27;
      background-size: 30px 30px;
      color: var(--text);
      font-family: 'Orbitron', 'Courier New', monospace;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1;
    }

    .ui-topbar{
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
      padding: calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 12px calc(14px + env(safe-area-inset-left));
      border-bottom: 3px solid var(--neon-cyan);
      background: rgba(0, 245, 255, 0.05);
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
    }

    .ui-btn{
      border: 2px solid var(--neon-cyan);
      background: rgba(0, 245, 255, 0.1);
      color: #000;
      padding: 10px 14px;
      border-radius: 0;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      background: var(--neon-cyan);
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 13px;
    }

    .ui-btn:hover{
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.8);
      transform: scale(1.05);
    }

    .ui-btn:active{
      transform: scale(0.95);
    }

    .ui-btn:focus-visible{
      outline: 3px solid var(--neon-yellow);
      outline-offset: 2px;
    }

    .ui-overlay{
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 39, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    .ui-card{
      background: rgba(10, 14, 39, 0.98);
      border: 3px solid var(--neon-pink);
      border-radius: 0;
      padding: 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 0, 110, 0.5);
    }

    .ui-card h2{
      margin: 0 0 14px 0;
      font-size: 32px;
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .ui-card p{
      margin: 0 0 16px 0;
      color: var(--neon-cyan);
      font-weight: 700;
      text-transform: uppercase;
    }

    .ui-card button{
      border: 2px solid var(--neon-green);
      background: var(--neon-green);
      color: #000;
      padding: 12px 18px;
      border-radius: 0;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.15s ease;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
    }

    .ui-card button:hover{
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.9);
      transform: scale(1.05);
    }

    .ui-hidden{ display: none; }

    .wrap{
      display: grid;
      grid-template-columns: 1fr minmax(240px, 280px);
      gap: 18px;
      padding: 16px;
      width: min(1000px, 96vw);
      margin: 0 auto;
      align-items: start;
      position: relative;
      z-index: 2;
    }

    .panel{
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(0, 245, 255, 0.08));
      border: 3px solid var(--neon-cyan);
      border-radius: 0;
      padding: 16px;
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.3), inset 0 0 15px rgba(0, 245, 255, 0.05);
    }

    .panel:last-child{
      border-color: var(--neon-pink);
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.3), inset 0 0 15px rgba(255, 0, 110, 0.05);
    }

    canvas{
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.05), rgba(0, 245, 255, 0.05)) #060915;
      border-radius: 0;
      border: 3px solid var(--neon-green);
      touch-action: none;
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.4), inset 0 0 20px rgba(57, 255, 20, 0.1);
    }

    h1{
      margin: 0 0 12px 0;
      font-size: 26px;
      color: var(--neon-pink);
      text-shadow: 0 0 15px var(--neon-pink);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 900;
    }

    .stat{
      display: flex;
      justify-content: space-between;
      color: var(--neon-cyan);
      padding: 8px 0;
      border-bottom: 2px solid rgba(0, 245, 255, 0.2);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      font-size: 13px;
    }

    .stat:last-child{ border-bottom: none; }

    .big{
      font-weight: 900;
      color: var(--neon-yellow);
      text-shadow: 0 0 10px var(--neon-yellow);
      font-size: 20px;
    }

    .controls{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    button{
      border: 2px solid rgba(0, 245, 255, 0.4);
      background: rgba(0, 245, 255, 0.08);
      color: var(--text);
      padding: 12px 10px;
      border-radius: 0;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      min-height: 44px;
      min-width: 44px;
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      font-family: 'Orbitron', monospace;
    }

    button:hover{
      border-color: var(--neon-cyan);
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
      transform: translateY(-2px);
    }

    button:active{
      transform: translateY(1px);
    }

    button:focus-visible{
      outline: 2px solid var(--neon-yellow);
      outline-offset: 1px;
    }

    .primary{
      background: var(--neon-green);
      color: #000;
      border-color: var(--neon-green);
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
      font-weight: 900;
    }

    .primary:hover{
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.8);
    }

    .danger{
      background: rgba(255, 0, 110, 0.15);
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
    }

    .danger:hover{
      background: rgba(255, 0, 110, 0.25);
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.6);
    }

    .hint{
      color: var(--neon-cyan);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-top: 2px solid rgba(0, 245, 255, 0.2);
      padding-top: 12px;
    }

    @media (max-width: 820px){
      .wrap{ grid-template-columns: 1fr; }
    }
  </style>
</head>
  <div class="ui-topbar" role="navigation" aria-label="Spillkontroller">
    <a class="ui-btn" href="/spill/">← Spillmeny</a>
    <button class="ui-btn" id="uiRestartBtn" type="button">🔄 Start på nytt</button>
    <button class="ui-btn" id="uiPauseBtn" type="button">⏸ Pause</button>
  </div>

  <div class="ui-overlay ui-hidden" id="pauseOverlay" aria-hidden="true">
    <div class="ui-card">
      <h2>Pauset</h2>
      <p>Klar til å fortsette?</p>
      <button id="resumeBtn" type="button">▶ Fortsett</button>
    </div>
  </div>

  <div class="ui-overlay ui-hidden" id="hintOverlay" aria-hidden="true">
    <div class="ui-card">
      <p>Tips: Hold inne venstre/høyre for å flytte.</p>
      <button id="hintOkBtn" type="button">OK</button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <canvas id="game" width="480" height="640" aria-label="Breakout canvas"></canvas>
    </div>

    <div class="panel">
      <h1>🏓 BREAKOUT</h1>
      <div class="stat"><span>Score</span><span class="big" id="score">0</span></div>
      <div class="stat"><span>Beste</span><span class="big" id="best">0</span></div>
      <div class="stat"><span>Liv</span><span class="big" id="lives">3</span></div>
      <div class="stat"><span>Status</span><span class="big" id="status">Klar</span></div>

      <div class="controls">
        <button id="left">←</button>
        <button id="start" class="primary">▶ START</button>
        <button id="right">→</button>
        <button id="restart" class="danger">⟳ Restart</button>
        <button id="pause">⏸ Pause</button>
        <button id="speed" class="primary">⚡ Normal</button>
      </div>

      <div class="hint">
        📱 iPad: Dra fingeren på brettet.<br/>
        ⌨️ PC: Bruk pil-knappene eller dra.
      </div>
    </div>
  </div>

<script src="../shared/game-runtime-utils.js"></script>
<script>
(() => {
  const gameId = 'breakout';
  const DEBUG = false;
  const hintKey = `alma:hintSeen:${gameId}`;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const livesEl = document.getElementById('lives');
  const statusEl= document.getElementById('status');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const hintOverlay = document.getElementById('hintOverlay');
  const uiPauseBtn = document.getElementById('uiPauseBtn');

  const BEST_KEY = 'alma_breakout_best';
  let best = Number(localStorage.getItem(BEST_KEY) || 0);
  bestEl.textContent = best;

  const state = {
    running: false,
    paused: false,
    speedMode: 0, // 0 normal, 1 fast
    score: 0,
    lives: 3
  };

  function softVibrate(ms = 12){ if (navigator.vibrate) navigator.vibrate(ms); }

  function setPaused(value){
    state.paused = Boolean(value);
    pauseOverlay.classList.toggle('ui-hidden', !state.paused);
    pauseOverlay.setAttribute('aria-hidden', state.paused ? 'false' : 'true');
    uiPauseBtn.textContent = state.paused ? '▶️ Fortsett' : '⏸️ Pause';
    if (!state.running) setStatus('Klar');
    else setStatus(state.paused ? 'Pauset' : 'Spiller');
  }

  function restartGame(){
    softVibrate(16);
    restart();
  }

  function showHintIfNeeded(){
    if (localStorage.getItem(hintKey) === '1') return;
    hintOverlay.classList.remove('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'false');
  }

  const inputLock = window.AlmaGameUtils.createInputLock({
    gameId,
    debug: DEBUG,
    overlayElement: pauseOverlay,
    isLocked: () => state.paused
  });

  const pauseController = window.AlmaGameUtils.createPauseVisibilityController({
    gameId,
    debug: DEBUG,
    isPaused: () => state.paused,
    setPaused,
    canPause: () => state.running
  });

  const paddle = { w: 110, h: 14, x: canvas.width/2 - 55, y: canvas.height - 50, speed: 7 };
  const ball = { r: 7, x: canvas.width/2, y: paddle.y - 10, vx: 3.4, vy: -4.2, stuck: true };

  const bricks = [];
  const BR = { rows: 6, cols: 8, w: 48, h: 18, pad: 10, top: 80, left: 34 };

  function resetBricks(){
    bricks.length = 0;
    for (let r=0;r<BR.rows;r++){
      for (let c=0;c<BR.cols;c++){
        bricks.push({
          x: BR.left + c*(BR.w+BR.pad),
          y: BR.top  + r*(BR.h+BR.pad),
          w: BR.w, h: BR.h,
          alive: true,
          hp: r < 2 ? 2 : 1 // litt variasjon
        });
      }
    }
  }

  function setStatus(txt){ statusEl.textContent = txt; }

  function restart(){
    state.score = 0;
    state.lives = 3;
    state.running = false;
    state.paused = false;
    paddle.x = canvas.width/2 - paddle.w/2;
    ball.stuck = true;
    ball.x = canvas.width/2;
    ball.y = paddle.y - 10;
    ball.vx = 3.4; ball.vy = -4.2;
    resetBricks();
    updateHUD();
    setPaused(false);
  }

  function updateHUD(){
    scoreEl.textContent = String(state.score);
    livesEl.textContent = String(state.lives);
    bestEl.textContent = String(best);
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    // Background med gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a0e27');
    grad.addColorStop(1, '#0f1535');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // bricks - neon farger
    for (const b of bricks){
      if (!b.alive) continue;
      
      // Alternating neon colors
      const colorIdx = (Math.floor((b.x + b.y) / 70)) % 3;
      if (colorIdx === 0) {
        ctx.fillStyle = '#ff006e'; // Neon pink
        ctx.shadowColor = 'rgba(255, 0, 110, 0.8)';
      } else if (colorIdx === 1) {
        ctx.fillStyle = '#00f5ff'; // Neon cyan
        ctx.shadowColor = 'rgba(0, 245, 255, 0.8)';
      } else {
        ctx.fillStyle = '#b537f2'; // Neon purple
        ctx.shadowColor = 'rgba(181, 55, 242, 0.8)';
      }
      
      ctx.shadowBlur = 15;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      
      roundRect(b.x,b.y,b.w,b.h,4);
      
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      
      ctx.fillStyle = 'rgba(255,255,255,.15)';
      ctx.fillRect(b.x+4,b.y+3,b.w-8,2);
    }

    // paddle - neon yellow
    ctx.fillStyle = '#ffff00';
    ctx.shadowColor = 'rgba(255, 255, 0, 0.9)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    
    ctx.fillStyle = 'rgba(255,255,255,.2)';
    ctx.fillRect(paddle.x+8, paddle.y+4, paddle.w-16, 4);

    // ball - neon green
    ctx.fillStyle = '#39ff14';
    ctx.shadowColor = 'rgba(57, 255, 20, 0.9)';
    ctx.shadowBlur = 25;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    if (!state.running){
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      
      ctx.fillStyle = '#39ff14';
      ctx.textAlign = 'center';
      ctx.font = '700 32px Orbitron, Arial';
      ctx.shadowColor = 'rgba(57, 255, 20, 0.9)';
      ctx.shadowBlur = 15;
      ctx.fillText('TRYKK START', canvas.width/2, canvas.height/2 - 20);
      
      ctx.font = '14px Orbitron, Arial';
      ctx.fillStyle = '#00f5ff';
      ctx.shadowColor = 'rgba(0, 245, 255, 0.6)';
      ctx.shadowBlur = 10;
      ctx.fillText('Dra fingeren for å styre plata', canvas.width/2, canvas.height/2 + 20);
      
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    } else if (state.paused){
      ctx.fillStyle = 'rgba(0,0,0,.45)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      
      ctx.fillStyle = '#ff006e';
      ctx.textAlign = 'center';
      ctx.font = '700 40px Orbitron, Arial';
      ctx.shadowColor = 'rgba(255, 0, 110, 0.9)';
      ctx.shadowBlur = 20;
      ctx.fillText('PAUSE', canvas.width/2, canvas.height/2);
      
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }
  }

  function roundRect(x,y,w,h,r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.arcTo(x+w,y,x+w,y+h,rr);
    ctx.arcTo(x+w,y+h,x,y+h,rr);
    ctx.arcTo(x,y+h,x,y,rr);
    ctx.arcTo(x,y,x+w,y,rr);
    ctx.closePath();
    ctx.fill();
  }

  function collideBrick(){
    for (const b of bricks){
      if (!b.alive) continue;
      if (ball.x+ball.r > b.x && ball.x-ball.r < b.x+b.w &&
          ball.y+ball.r > b.y && ball.y-ball.r < b.y+b.h){
        // basic bounce: flip vy
        ball.vy *= -1;
        b.hp--;
        if (b.hp <= 0) { b.alive = false; state.score += 10; }
        else { state.score += 4; }
        if (state.score > best){ best = state.score; localStorage.setItem(BEST_KEY, String(best)); }
        updateHUD();
        return;
      }
    }
  }

  function allCleared(){ return bricks.every(b => !b.alive); }

  function step(){
    if (!state.running || inputLock.blocked('step')) return;

    const speedMul = state.speedMode === 1 ? 1.25 : 1;

    if (ball.stuck){
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - 10;
      return;
    }

    ball.x += ball.vx * speedMul;
    ball.y += ball.vy * speedMul;

    // walls
    if (ball.x - ball.r < 0){ ball.x = ball.r; ball.vx *= -1; }
    if (ball.x + ball.r > canvas.width){ ball.x = canvas.width - ball.r; ball.vx *= -1; }
    if (ball.y - ball.r < 0){ ball.y = ball.r; ball.vy *= -1; }

    // paddle
    if (ball.y + ball.r >= paddle.y &&
        ball.x >= paddle.x && ball.x <= paddle.x + paddle.w &&
        ball.y < paddle.y + paddle.h + 12){
      ball.y = paddle.y - ball.r;
      ball.vy = -Math.abs(ball.vy);
      const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      ball.vx = 4.4 * hit;
    }

    // bricks
    collideBrick();

    // bottom = lose life
    if (ball.y - ball.r > canvas.height){
      state.lives--;
      updateHUD();
      if (state.lives <= 0){
        state.running = false;
        setStatus('Game Over');
        ball.stuck = true;
      } else {
        ball.stuck = true;
        setStatus('Prøv igjen!');
      }
    }

    // win
    if (allCleared()){
      state.running = false;
      setStatus('Du vant! 🎉');
      ball.stuck = true;
    }
  }

  // Controls
  function movePaddle(dx){
    paddle.x = clamp(paddle.x + dx, 10, canvas.width - paddle.w - 10);
  }

  document.getElementById('left').addEventListener('pointerdown', () => { holdDir = -1; });
  document.getElementById('right').addEventListener('pointerdown', () => { holdDir = 1; });
  function resetHoldInput(){ holdDir = 0; }
  document.getElementById('left').addEventListener('pointerup', resetHoldInput);
  document.getElementById('right').addEventListener('pointerup', resetHoldInput);
  document.getElementById('left').addEventListener('pointercancel', resetHoldInput);
  document.getElementById('right').addEventListener('pointercancel', resetHoldInput);
  document.getElementById('left').addEventListener('pointerleave', resetHoldInput);
  document.getElementById('right').addEventListener('pointerleave', resetHoldInput);
  window.addEventListener('pointerup', resetHoldInput);
  window.addEventListener('pointercancel', resetHoldInput);

  let holdDir = 0;

  document.addEventListener('keydown', (e) => {
    const t = e.target;
    const isTextInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    if (!isTextInput && (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Space' || e.code === 'Enter')) {
      e.preventDefault();
    }
  }, { passive: false });

  document.getElementById('start').addEventListener('click', () => {
    state.running = true;
    setPaused(false);
    ball.stuck = false;
  });

  document.getElementById('pause').addEventListener('click', () => {
    if (!state.running) return;
    pauseController.toggle('panel-button');
  });

  document.getElementById('restart').addEventListener('click', restart);

  document.getElementById('uiPauseBtn').addEventListener('click', () => {
    if (!state.running) return;
    softVibrate(12);
    pauseController.toggle('topbar');
  });
  document.getElementById('uiRestartBtn').addEventListener('click', restartGame);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.resume('overlay');
  });
  document.getElementById('hintOkBtn').addEventListener('click', () => {
    softVibrate(12);
    localStorage.setItem(hintKey, '1');
    hintOverlay.classList.add('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'true');
  });

  const speedBtn = document.getElementById('speed');
  speedBtn.addEventListener('click', () => {
    state.speedMode = (state.speedMode + 1) % 2;
    speedBtn.textContent = state.speedMode === 1 ? '⚡ Rask' : '⚡ Normal';
  });

  // Touch: drag on canvas to set paddle position
  canvas.addEventListener('pointerdown', (e) => {
    canvas.setPointerCapture(e.pointerId);
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    paddle.x = clamp(x - paddle.w/2, 10, canvas.width - paddle.w - 10);
  });

  canvas.addEventListener('lostpointercapture', resetHoldInput);

  canvas.addEventListener('pointermove', (e) => {
    if (e.buttons === 0 && e.pointerType === 'mouse') return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    paddle.x = clamp(x - paddle.w/2, 10, canvas.width - paddle.w - 10);
  });

  function loop(){
    if (holdDir !== 0) movePaddle(holdDir * paddle.speed);
    step();
    draw();
    requestAnimationFrame(loop);
  }

  restart();
  showHintIfNeeded();
  loop();
})();
</script>
</body>
</html>
