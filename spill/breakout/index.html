<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Breakout | Alma.rocks</title>
  <style>
    :root{--bg:#0b1020;--text:#e9ecff;--muted:#a9b1d6;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.12);--btnbg:rgba(255,255,255,.06);--accent:#7aa2f7;--ok:#9ece6a;--danger:#f7768e;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03);position:sticky;top:0;z-index:10}
    .topbar .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .topbar a{text-decoration:none;color:var(--text);background:var(--btnbg);border:1px solid var(--border2);padding:8px 12px;border-radius:999px;user-select:none}
    .topbar .label{color:var(--muted);font-size:13px}
    .wrap{display:grid;grid-template-columns: 1fr minmax(220px,260px);gap:14px;padding:14px;width:min(980px,96vw);margin:0 auto;align-items:start}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid var(--border);border-radius:16px;padding:12px}
    canvas{width:100%;height:auto;display:block;background:#060915;border-radius:16px;border:1px solid var(--border2);touch-action:none}
    h1{margin:0 0 8px 0;font-size:20px}
    .stat{display:flex;justify-content:space-between;color:var(--muted);padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.12)}
    .stat:last-child{border-bottom:none}
    .big{font-weight:800;color:var(--text)}
    .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
    button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:12px 10px;border-radius:14px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation}
    button:active{transform:translateY(1px)}
    .primary{background:var(--accent);color:#0b1020;border-color:transparent}
    .danger{background:rgba(247,118,142,.16);border-color:rgba(247,118,142,.35)}
    .hint{color:var(--muted);font-size:13px;line-height:1.35;margin-top:10px}
    @media (max-width: 820px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="left">
      <a href="/spill/">← Spillmeny</a>
      <a href="/">← Alma.rocks</a>
    </div>
    <div class="label">Breakout</div>
  </div>

  <div class="wrap">
    <div class="panel">
      <canvas id="game" width="480" height="640" aria-label="Breakout canvas"></canvas>
    </div>

    <div class="panel">
      <h1>🧱 Breakout</h1>
      <div class="stat"><span>Score</span><span class="big" id="score">0</span></div>
      <div class="stat"><span>Beste</span><span class="big" id="best">0</span></div>
      <div class="stat"><span>Liv</span><span class="big" id="lives">3</span></div>
      <div class="stat"><span>Status</span><span class="big" id="status">Klar</span></div>

      <div class="controls">
        <button id="left">←</button>
        <button id="start" class="primary">Start</button>
        <button id="right">→</button>
        <button id="restart" class="danger">Restart</button>
        <button id="pause">Pause</button>
        <button id="speed" class="primary">Tempo: Normal</button>
      </div>

      <div class="hint">
        iPad: Dra fingeren på brettet for å flytte plata (paddle).<br/>
        Alternativt: Bruk ←/→-knappene. Mål: knus alle klossene!
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const livesEl = document.getElementById('lives');
  const statusEl= document.getElementById('status');

  const BEST_KEY = 'alma_breakout_best';
  let best = Number(localStorage.getItem(BEST_KEY) || 0);
  bestEl.textContent = best;

  const state = {
    running: false,
    paused: false,
    speedMode: 0, // 0 normal, 1 fast
    score: 0,
    lives: 3
  };

  const paddle = { w: 110, h: 14, x: canvas.width/2 - 55, y: canvas.height - 50, speed: 7 };
  const ball = { r: 7, x: canvas.width/2, y: paddle.y - 10, vx: 3.4, vy: -4.2, stuck: true };

  const bricks = [];
  const BR = { rows: 6, cols: 8, w: 48, h: 18, pad: 10, top: 80, left: 34 };

  function resetBricks(){
    bricks.length = 0;
    for (let r=0;r<BR.rows;r++){
      for (let c=0;c<BR.cols;c++){
        bricks.push({
          x: BR.left + c*(BR.w+BR.pad),
          y: BR.top  + r*(BR.h+BR.pad),
          w: BR.w, h: BR.h,
          alive: true,
          hp: r < 2 ? 2 : 1 // litt variasjon
        });
      }
    }
  }

  function setStatus(txt){ statusEl.textContent = txt; }

  function restart(){
    state.score = 0;
    state.lives = 3;
    state.running = false;
    state.paused = false;
    paddle.x = canvas.width/2 - paddle.w/2;
    ball.stuck = true;
    ball.x = canvas.width/2;
    ball.y = paddle.y - 10;
    ball.vx = 3.4; ball.vy = -4.2;
    resetBricks();
    updateHUD();
    setStatus('Klar');
  }

  function updateHUD(){
    scoreEl.textContent = String(state.score);
    livesEl.textContent = String(state.lives);
    bestEl.textContent = String(best);
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#060915';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // bricks
    for (const b of bricks){
      if (!b.alive) continue;
      ctx.fillStyle = b.hp === 2 ? '#7aa2f7' : '#9ece6a';
      roundRect(b.x,b.y,b.w,b.h,6);
      ctx.fillStyle = 'rgba(11,16,32,.28)';
      ctx.fillRect(b.x+6,b.y+5,b.w-12,3);
    }

    // paddle
    ctx.fillStyle = '#e0af68';
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 8);

    // ball
    ctx.fillStyle = '#e9ecff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();

    if (!state.running){
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#e9ecff';
      ctx.textAlign = 'center';
      ctx.font = '700 24px system-ui,Segoe UI,Arial';
      ctx.fillText('Trykk Start', canvas.width/2, canvas.height/2 - 10);
      ctx.font = '14px system-ui,Segoe UI,Arial';
      ctx.fillStyle = 'rgba(233,236,255,.85)';
      ctx.fillText('Dra fingeren for å styre plata', canvas.width/2, canvas.height/2 + 18);
    } else if (state.paused){
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#e9ecff';
      ctx.textAlign = 'center';
      ctx.font = '700 24px system-ui,Segoe UI,Arial';
      ctx.fillText('Pause', canvas.width/2, canvas.height/2);
    }
  }

  function roundRect(x,y,w,h,r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.arcTo(x+w,y,x+w,y+h,rr);
    ctx.arcTo(x+w,y+h,x,y+h,rr);
    ctx.arcTo(x,y+h,x,y,rr);
    ctx.arcTo(x,y,x+w,y,rr);
    ctx.closePath();
    ctx.fill();
  }

  function collideBrick(){
    for (const b of bricks){
      if (!b.alive) continue;
      if (ball.x+ball.r > b.x && ball.x-ball.r < b.x+b.w &&
          ball.y+ball.r > b.y && ball.y-ball.r < b.y+b.h){
        // basic bounce: flip vy
        ball.vy *= -1;
        b.hp--;
        if (b.hp <= 0) { b.alive = false; state.score += 10; }
        else { state.score += 4; }
        if (state.score > best){ best = state.score; localStorage.setItem(BEST_KEY, String(best)); }
        updateHUD();
        return;
      }
    }
  }

  function allCleared(){ return bricks.every(b => !b.alive); }

  function step(){
    if (!state.running || state.paused) return;

    const speedMul = state.speedMode === 1 ? 1.25 : 1;

    if (ball.stuck){
