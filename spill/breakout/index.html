<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Breakout | Alma.rocks</title>
  <style>
    :root{--bg:#0b1020;--text:#e9ecff;--muted:#a9b1d6;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.12);--btnbg:rgba(255,255,255,.06);--accent:#7aa2f7;--ok:#9ece6a;--danger:#f7768e;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    .ui-topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-start;padding:calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 10px calc(12px + env(safe-area-inset-left));border-bottom:1px solid var(--border);background:rgba(255,255,255,.04);position:sticky;top:0;z-index:20}
    .ui-btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:var(--text);padding:10px 14px;border-radius:12px;font-weight:800;cursor:pointer;user-select:none;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:44px;min-width:44px;touch-action:manipulation}
    .ui-btn:focus-visible,button:focus-visible,.topbar a:focus-visible{outline:3px solid var(--ok);outline-offset:2px}
    .ui-overlay{position:fixed;inset:0;background:rgba(6,9,21,.6);display:flex;align-items:center;justify-content:center;z-index:30;padding:16px}
    .ui-card{background:rgba(11,16,32,.96);border:1px solid var(--border2);border-radius:16px;padding:16px;max-width:340px;width:100%;text-align:center}
    .ui-card h2{margin:0 0 10px 0;font-size:28px}
    .ui-card p{margin:0 0 12px 0;color:var(--muted)}
    .ui-hidden{display:none}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03);position:sticky;top:0;z-index:10}
    .topbar .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .topbar a{text-decoration:none;color:var(--text);background:var(--btnbg);border:1px solid var(--border2);padding:8px 12px;border-radius:999px;user-select:none}
    .topbar .label{color:var(--muted);font-size:13px}
    .wrap{display:grid;grid-template-columns: 1fr minmax(220px,260px);gap:14px;padding:14px;width:min(980px,96vw);margin:0 auto;align-items:start}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid var(--border);border-radius:16px;padding:12px}
    canvas{width:100%;height:auto;display:block;background:#060915;border-radius:16px;border:1px solid var(--border2);touch-action:none}
    h1{margin:0 0 8px 0;font-size:20px}
    .stat{display:flex;justify-content:space-between;color:var(--muted);padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.12)}
    .stat:last-child{border-bottom:none}
    .big{font-weight:800;color:var(--text)}
    .controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
    button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:12px 10px;border-radius:14px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;min-height:44px;min-width:44px}
    button:active{transform:translateY(1px)}
    .primary{background:var(--accent);color:#0b1020;border-color:transparent}
    .danger{background:rgba(247,118,142,.16);border-color:rgba(247,118,142,.35)}
    .hint{color:var(--muted);font-size:13px;line-height:1.35;margin-top:10px}
    @media (max-width: 820px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="ui-topbar" role="navigation" aria-label="Spillkontroller">
    <a class="ui-btn" href="/spill/">⬅️ Spillmeny</a>
    <button class="ui-btn" id="uiRestartBtn" type="button">🔄 Start på nytt</button>
    <button class="ui-btn" id="uiPauseBtn" type="button">⏸️ Pause</button>
  </div>

  <div class="ui-overlay ui-hidden" id="pauseOverlay" aria-hidden="true">
    <div class="ui-card">
      <h2>Pauset</h2>
      <button class="ui-btn" id="resumeBtn" type="button">Fortsett</button>
    </div>
  </div>

  <div class="ui-overlay ui-hidden" id="hintOverlay" aria-hidden="true">
    <div class="ui-card">
      <p>Tips: Hold inne venstre/hoyre for a flytte.</p>
      <button class="ui-btn" id="hintOkBtn" type="button">OK</button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <canvas id="game" width="480" height="640" aria-label="Breakout canvas"></canvas>
    </div>

    <div class="panel">
      <h1>🧱 Breakout</h1>
      <div class="stat"><span>Score</span><span class="big" id="score">0</span></div>
      <div class="stat"><span>Beste</span><span class="big" id="best">0</span></div>
      <div class="stat"><span>Liv</span><span class="big" id="lives">3</span></div>
      <div class="stat"><span>Status</span><span class="big" id="status">Klar</span></div>

      <div class="controls">
        <button id="left">←</button>
        <button id="start" class="primary">Start</button>
        <button id="right">→</button>
        <button id="restart" class="danger">Restart</button>
        <button id="pause">Pause</button>
        <button id="speed" class="primary">Tempo: Normal</button>
      </div>

      <div class="hint">
        iPad: Dra fingeren på brettet for å flytte plata (paddle).<br/>
        Alternativt: Bruk ←/→-knappene. Mål: knus alle klossene!
      </div>
    </div>
  </div>

<script src="../shared/game-runtime-utils.js"></script>
<script>
(() => {
  const gameId = 'breakout';
  const DEBUG = false;
  const hintKey = `alma:hintSeen:${gameId}`;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const livesEl = document.getElementById('lives');
  const statusEl= document.getElementById('status');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const hintOverlay = document.getElementById('hintOverlay');
  const uiPauseBtn = document.getElementById('uiPauseBtn');

  const BEST_KEY = 'alma_breakout_best';
  let best = Number(localStorage.getItem(BEST_KEY) || 0);
  bestEl.textContent = best;

  const state = {
    running: false,
    paused: false,
    speedMode: 0, // 0 normal, 1 fast
    score: 0,
    lives: 3
  };

  function softVibrate(ms = 12){ if (navigator.vibrate) navigator.vibrate(ms); }

  function setPaused(value){
    state.paused = Boolean(value);
    pauseOverlay.classList.toggle('ui-hidden', !state.paused);
    pauseOverlay.setAttribute('aria-hidden', state.paused ? 'false' : 'true');
    uiPauseBtn.textContent = state.paused ? '▶️ Fortsett' : '⏸️ Pause';
    if (!state.running) setStatus('Klar');
    else setStatus(state.paused ? 'Pauset' : 'Spiller');
  }

  function restartGame(){
    softVibrate(16);
    restart();
  }

  function showHintIfNeeded(){
    if (localStorage.getItem(hintKey) === '1') return;
    hintOverlay.classList.remove('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'false');
  }

  const inputLock = window.AlmaGameUtils.createInputLock({
    gameId,
    debug: DEBUG,
    overlayElement: pauseOverlay,
    isLocked: () => state.paused
  });

  const pauseController = window.AlmaGameUtils.createPauseVisibilityController({
    gameId,
    debug: DEBUG,
    isPaused: () => state.paused,
    setPaused,
    canPause: () => state.running
  });

  const paddle = { w: 110, h: 14, x: canvas.width/2 - 55, y: canvas.height - 50, speed: 7 };
  const ball = { r: 7, x: canvas.width/2, y: paddle.y - 10, vx: 3.4, vy: -4.2, stuck: true };

  const bricks = [];
  const BR = { rows: 6, cols: 8, w: 48, h: 18, pad: 10, top: 80, left: 34 };

  function resetBricks(){
    bricks.length = 0;
    for (let r=0;r<BR.rows;r++){
      for (let c=0;c<BR.cols;c++){
        bricks.push({
          x: BR.left + c*(BR.w+BR.pad),
          y: BR.top  + r*(BR.h+BR.pad),
          w: BR.w, h: BR.h,
          alive: true,
          hp: r < 2 ? 2 : 1 // litt variasjon
        });
      }
    }
  }

  function setStatus(txt){ statusEl.textContent = txt; }

  function restart(){
    state.score = 0;
    state.lives = 3;
    state.running = false;
    state.paused = false;
    paddle.x = canvas.width/2 - paddle.w/2;
    ball.stuck = true;
    ball.x = canvas.width/2;
    ball.y = paddle.y - 10;
    ball.vx = 3.4; ball.vy = -4.2;
    resetBricks();
    updateHUD();
    setPaused(false);
  }

  function updateHUD(){
    scoreEl.textContent = String(state.score);
    livesEl.textContent = String(state.lives);
    bestEl.textContent = String(best);
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#060915';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // bricks
    for (const b of bricks){
      if (!b.alive) continue;
      ctx.fillStyle = b.hp === 2 ? '#7aa2f7' : '#9ece6a';
      roundRect(b.x,b.y,b.w,b.h,6);
      ctx.fillStyle = 'rgba(11,16,32,.28)';
      ctx.fillRect(b.x+6,b.y+5,b.w-12,3);
    }

    // paddle
    ctx.fillStyle = '#e0af68';
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 8);

    // ball
    ctx.fillStyle = '#e9ecff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();

    if (!state.running){
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#e9ecff';
      ctx.textAlign = 'center';
      ctx.font = '700 24px system-ui,Segoe UI,Arial';
      ctx.fillText('Trykk Start', canvas.width/2, canvas.height/2 - 10);
      ctx.font = '14px system-ui,Segoe UI,Arial';
      ctx.fillStyle = 'rgba(233,236,255,.85)';
      ctx.fillText('Dra fingeren for å styre plata', canvas.width/2, canvas.height/2 + 18);
    } else if (state.paused){
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#e9ecff';
      ctx.textAlign = 'center';
      ctx.font = '700 24px system-ui,Segoe UI,Arial';
      ctx.fillText('Pause', canvas.width/2, canvas.height/2);
    }
  }

  function roundRect(x,y,w,h,r){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.arcTo(x+w,y,x+w,y+h,rr);
    ctx.arcTo(x+w,y+h,x,y+h,rr);
    ctx.arcTo(x,y+h,x,y,rr);
    ctx.arcTo(x,y,x+w,y,rr);
    ctx.closePath();
    ctx.fill();
  }

  function collideBrick(){
    for (const b of bricks){
      if (!b.alive) continue;
      if (ball.x+ball.r > b.x && ball.x-ball.r < b.x+b.w &&
          ball.y+ball.r > b.y && ball.y-ball.r < b.y+b.h){
        // basic bounce: flip vy
        ball.vy *= -1;
        b.hp--;
        if (b.hp <= 0) { b.alive = false; state.score += 10; }
        else { state.score += 4; }
        if (state.score > best){ best = state.score; localStorage.setItem(BEST_KEY, String(best)); }
        updateHUD();
        return;
      }
    }
  }

  function allCleared(){ return bricks.every(b => !b.alive); }

  function step(){
    if (!state.running || inputLock.blocked('step')) return;

    const speedMul = state.speedMode === 1 ? 1.25 : 1;

    if (ball.stuck){
      ball.x = paddle.x + paddle.w/2;
      ball.y = paddle.y - 10;
      return;
    }

    ball.x += ball.vx * speedMul;
    ball.y += ball.vy * speedMul;

    // walls
    if (ball.x - ball.r < 0){ ball.x = ball.r; ball.vx *= -1; }
    if (ball.x + ball.r > canvas.width){ ball.x = canvas.width - ball.r; ball.vx *= -1; }
    if (ball.y - ball.r < 0){ ball.y = ball.r; ball.vy *= -1; }

    // paddle
    if (ball.y + ball.r >= paddle.y &&
        ball.x >= paddle.x && ball.x <= paddle.x + paddle.w &&
        ball.y < paddle.y + paddle.h + 12){
      ball.y = paddle.y - ball.r;
      ball.vy = -Math.abs(ball.vy);
      const hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      ball.vx = 4.4 * hit;
    }

    // bricks
    collideBrick();

    // bottom = lose life
    if (ball.y - ball.r > canvas.height){
      state.lives--;
      updateHUD();
      if (state.lives <= 0){
        state.running = false;
        setStatus('Game Over');
        ball.stuck = true;
      } else {
        ball.stuck = true;
        setStatus('Prøv igjen!');
      }
    }

    // win
    if (allCleared()){
      state.running = false;
      setStatus('Du vant! 🎉');
      ball.stuck = true;
    }
  }

  // Controls
  function movePaddle(dx){
    paddle.x = clamp(paddle.x + dx, 10, canvas.width - paddle.w - 10);
  }

  document.getElementById('left').addEventListener('pointerdown', () => { holdDir = -1; });
  document.getElementById('right').addEventListener('pointerdown', () => { holdDir = 1; });
  function resetHoldInput(){ holdDir = 0; }
  document.getElementById('left').addEventListener('pointerup', resetHoldInput);
  document.getElementById('right').addEventListener('pointerup', resetHoldInput);
  document.getElementById('left').addEventListener('pointercancel', resetHoldInput);
  document.getElementById('right').addEventListener('pointercancel', resetHoldInput);
  document.getElementById('left').addEventListener('pointerleave', resetHoldInput);
  document.getElementById('right').addEventListener('pointerleave', resetHoldInput);
  window.addEventListener('pointerup', resetHoldInput);
  window.addEventListener('pointercancel', resetHoldInput);

  let holdDir = 0;

  document.addEventListener('keydown', (e) => {
    const t = e.target;
    const isTextInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    if (!isTextInput && (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Space' || e.code === 'Enter')) {
      e.preventDefault();
    }
  }, { passive: false });

  document.getElementById('start').addEventListener('click', () => {
    state.running = true;
    setPaused(false);
    ball.stuck = false;
  });

  document.getElementById('pause').addEventListener('click', () => {
    if (!state.running) return;
    pauseController.toggle('panel-button');
  });

  document.getElementById('restart').addEventListener('click', restart);

  document.getElementById('uiPauseBtn').addEventListener('click', () => {
    if (!state.running) return;
    softVibrate(12);
    pauseController.toggle('topbar');
  });
  document.getElementById('uiRestartBtn').addEventListener('click', restartGame);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.resume('overlay');
  });
  document.getElementById('hintOkBtn').addEventListener('click', () => {
    softVibrate(12);
    localStorage.setItem(hintKey, '1');
    hintOverlay.classList.add('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'true');
  });

  const speedBtn = document.getElementById('speed');
  speedBtn.addEventListener('click', () => {
    state.speedMode = (state.speedMode + 1) % 2;
    speedBtn.textContent = state.speedMode === 1 ? 'Tempo: Rask' : 'Tempo: Normal';
  });

  // Touch: drag on canvas to set paddle position
  canvas.addEventListener('pointerdown', (e) => {
    canvas.setPointerCapture(e.pointerId);
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    paddle.x = clamp(x - paddle.w/2, 10, canvas.width - paddle.w - 10);
  });

  canvas.addEventListener('lostpointercapture', resetHoldInput);

  canvas.addEventListener('pointermove', (e) => {
    if (e.buttons === 0 && e.pointerType === 'mouse') return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    paddle.x = clamp(x - paddle.w/2, 10, canvas.width - paddle.w - 10);
  });

  function loop(){
    if (holdDir !== 0) movePaddle(holdDir * paddle.speed);
    step();
    draw();
    requestAnimationFrame(loop);
  }

  restart();
  showHintIfNeeded();
  loop();
})();
</script>
</body>
</html>
