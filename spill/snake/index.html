<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>Snake | Alma.rocks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    :root{
      --neon-pink: #ff006e;
      --neon-cyan: #00f5ff;
      --neon-yellow: #ffff00;
      --neon-purple: #b537f2;
      --neon-green: #39ff14;
      --bg: #0a0e27;
      --text: #ffffff;
      --muted: #a0aec0;
      --border: rgba(0, 245, 255, 0.3);
      --btnbg: rgba(0, 245, 255, 0.1);
      font-family: 'Orbitron', 'Courier New', monospace;
    }

    html,body{height:100%;margin:0}
    body{
      background: linear-gradient(45deg, rgba(255, 0, 110, 0.05) 1px, transparent 1px),
                  linear-gradient(-45deg, rgba(0, 245, 255, 0.05) 1px, transparent 1px),
                  #0a0e27;
      background-size: 30px 30px;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1;
    }
    .ui-topbar{
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
      padding: calc(12px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 12px calc(14px + env(safe-area-inset-left));
      border-bottom: 3px solid var(--neon-cyan);
      background: rgba(0, 245, 255, 0.05);
      position: sticky;
      top: 0;
      z-index: 40;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
    }
    .ui-btn{
      border: 2px solid var(--neon-cyan);
      background: var(--neon-cyan);
      color: #000;
      padding: 10px 14px;
      border-radius: 0;
      font-weight: 900;
      cursor: pointer;
      user-select: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 13px;
    }

    .ui-btn:hover{
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.8);
      transform: scale(1.05);
    }

    .ui-btn:active{
      transform: scale(0.95);
    }
    .ui-overlay{
      position: fixed;
      inset: 0;
      background: rgba(10, 14, 39, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding: 16px;
      backdrop-filter: blur(4px);
    }
    .ui-card{
      background: rgba(10, 14, 39, 0.98);
      border: 3px solid var(--neon-pink);
      border-radius: 0;
      padding: 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 0, 110, 0.5);
    }
    .ui-card h2{
      margin: 0 0 14px 0;
      font-size: 32px;
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .ui-card p{
      margin: 0 0 16px 0;
      color: var(--neon-cyan);
      font-weight: 700;
      text-transform: uppercase;
    }

    .ui-card button{
      border: 2px solid var(--neon-green);
      background: var(--neon-green);
      color: #000;
      padding: 12px 18px;
      border-radius: 0;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.15s ease;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
    }

    .ui-card button:hover{
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.9);
      transform: scale(1.05);
    }

    .ui-hidden{ display: none; }

    .topbar .label{
      color: var(--muted);
      font-size: 13px;
    }

    /* Innhold under toppmenyen */
    .wrap{
      min-height: calc(100vh - 54px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 18px 12px 24px;
      position: relative;
      z-index: 2;
    }

    h1{
      margin: 0;
      font-size: 2rem;
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 900;
    }

    .hud{
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pill{
      background: rgba(0, 245, 255, 0.1);
      border: 2px solid var(--neon-cyan);
      border-radius: 0;
      padding: 10px 16px;
      font-weight: 900;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 13px;
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
    }

    canvas{
      border: 3px solid var(--neon-green);
      border-radius: 0;
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.05), rgba(0, 245, 255, 0.05)) #060915;
      touch-action: none;
      display: block;
      box-shadow: 0 0 40px rgba(57, 255, 20, 0.4), inset 0 0 20px rgba(57, 255, 20, 0.1);
    }

    .buttons{
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button{
      appearance: none;
      border: 2px solid var(--neon-green);
      border-radius: 0;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      background: var(--neon-green);
      color: #000;
      user-select: none;
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Orbitron', monospace;
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
    }

    button:hover{
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.8);
      transform: translateY(-2px);
    }

    button:active{ transform: translateY(1px); }

    button:focus-visible{
      outline: 2px solid var(--neon-yellow);
      outline-offset: 2px;
    }

    .hint{
      opacity: 0.9;
      font-size: 13px;
      text-align: center;
      max-width: 520px;
      color: var(--neon-cyan);
      line-height: 1.5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <!-- Toppmeny (samme mønster som Tetris/Space Invaders) -->
  <div class="ui-topbar" role="navigation" aria-label="Spillkontroller">
    <a class="ui-btn" href="/spill/">⬅️ Spillmeny</a>
    <button class="ui-btn" id="uiRestartBtn" type="button">🔄 Start på nytt</button>
    <button class="ui-btn" id="uiPauseBtn" type="button">⏸️ Pause</button>
  </div>

  <div class="ui-overlay ui-hidden" id="pauseOverlay" aria-hidden="true">
    <div class="ui-card">
      <h2>Pauset</h2>
      <button class="ui-btn" id="resumeBtn" type="button">Fortsett</button>
    </div>
  </div>

  <div class="ui-overlay ui-hidden" id="hintOverlay" aria-hidden="true">
    <div class="ui-card">
      <p>Tips: Sveip eller bruk piltaster.</p>
      <button class="ui-btn" id="hintOkBtn" type="button">OK</button>
    </div>
  </div>

  <div class="wrap">
    <h1>🐍 Snake</h1>

    <div class="hud">
      <div class="pill">Poeng: <span id="score">0</span></div>
      <div class="pill">Beste: <span id="best">0</span></div>
    </div>

    <canvas id="game" width="360" height="360" aria-label="Snake canvas"></canvas>

    <div class="buttons">
      <button id="restart">Start på nytt</button>
    </div>

    <div class="hint">
      Bruk piltaster ⬅⬆➡⬇. På iPad/mobil: sveip på brettet.
      Målet er å spise eplet 🍎 uten å krasje i deg selv.
    </div>
  </div>

<script src="../shared/game-runtime-utils.js"></script>
<script>
(() => {
  const gameId = 'snake';
  const DEBUG = false;
  const hintKey = `alma:hintSeen:${gameId}`;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const hintOverlay = document.getElementById('hintOverlay');
  const uiPauseBtn = document.getElementById('uiPauseBtn');

  // Grid
  const grid = 18;               // størrelse på rutenett
  const cells = canvas.width / grid; // 360/18 = 20 ruter
  let count = 0;

  // Score
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const bestKey = 'alma_snake_best';

  let score = 0;
  let best  = Number(localStorage.getItem(bestKey) || 0);
  bestEl.textContent = best;
  let paused = false;

  function softVibrate(ms = 12){ if (navigator.vibrate) navigator.vibrate(ms); }

  function setPaused(value){
    paused = Boolean(value);
    pauseOverlay.classList.toggle('ui-hidden', !paused);
    pauseOverlay.setAttribute('aria-hidden', paused ? 'false' : 'true');
    uiPauseBtn.textContent = paused ? '▶️ Fortsett' : '⏸️ Pause';
  }

  function restartGame(){
    softVibrate(16);
    reset();
    setPaused(false);
  }

  function showHintIfNeeded(){
    if (localStorage.getItem(hintKey) === '1') return;
    hintOverlay.classList.remove('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'false');
  }

  const inputLock = window.AlmaGameUtils.createInputLock({
    gameId,
    debug: DEBUG,
    overlayElement: pauseOverlay,
    isLocked: () => paused
  });

  const pauseController = window.AlmaGameUtils.createPauseVisibilityController({
    gameId,
    debug: DEBUG,
    isPaused: () => paused,
    setPaused,
    canPause: () => true
  });

  const snake = {
    x: grid * 10,
    y: grid * 10,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
  };

  let apple = { x: grid * 5, y: grid * 5 };

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min)) + min;
  }

  function placeApple() {
    // prøv til vi finner et ledig felt
    for (let tries = 0; tries < 200; tries++) {
      const ax = randInt(0, cells) * grid;
      const ay = randInt(0, cells) * grid;
      const onSnake = snake.cells.some(c => c.x === ax && c.y === ay);
      if (!onSnake) { apple = { x: ax, y: ay }; return; }
    }
    // fallback (skjer nesten aldri)
    apple = { x: randInt(0, cells) * grid, y: randInt(0, cells) * grid };
  }

  function reset() {
    snake.x = grid * 10;
    snake.y = grid * 10;
    snake.dx = grid;
    snake.dy = 0;
    snake.cells = [];
    snake.maxCells = 4;
    score = 0;
    scoreEl.textContent = score;
    placeApple();
  }

  function drawCell(x, y, color) {
    ctx.fillStyle = color;
    ctx.shadowColor = color.replace(')', ', 0.8)').replace('rgb(', 'rgba(');
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;
    ctx.fillRect(x + 1, y + 1, grid - 2, grid - 2);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  }

  function loop() {
    requestAnimationFrame(loop);
    if (paused) return;

    if (++count < 4) return; // fart (lavere = raskere)
    count = 0;

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a0e27');
    grad.addColorStop(1, '#0f1535');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // flytt
    snake.x += snake.dx;
    snake.y += snake.dy;

    // wrap rundt vegger (snillere for barn)
    if (snake.x < 0) snake.x = canvas.width - grid;
    else if (snake.x >= canvas.width) snake.x = 0;

    if (snake.y < 0) snake.y = canvas.height - grid;
    else if (snake.y >= canvas.height) snake.y = 0;

    snake.cells.unshift({ x: snake.x, y: snake.y });
    if (snake.cells.length > snake.maxCells) snake.cells.pop();

    // eple - neon pink
    drawCell(apple.x, apple.y, 'rgb(255, 0, 110)');

    // slange - neon green
    snake.cells.forEach((cell, index) => {
      drawCell(cell.x, cell.y, index === 0 ? 'rgb(57, 255, 20)' : 'rgb(39, 200, 15)');

      // spis eple
      if (cell.x === apple.x && cell.y === apple.y) {
        snake.maxCells++;
        score++;
        scoreEl.textContent = score;

        if (score > best) {
          best = score;
          localStorage.setItem(bestKey, String(best));
          bestEl.textContent = best;
        }
        placeApple();
      }

      // krasj i seg selv
      for (let i = index + 1; i < snake.cells.length; i++) {
        if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
          reset();
          break;
        }
      }
    });
  }

  // keyboard
  document.addEventListener('keydown', (e) => {
    const t = e.target;
    const isTextInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    if (!isTextInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
    }
    if (inputLock.blocked('keydown', { key: e.key })) return;
    const key = e.key;
    if (key === 'ArrowLeft'  && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
    else if (key === 'ArrowUp'    && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
    else if (key === 'ArrowRight' && snake.dx === 0) { snake.dx = grid;  snake.dy = 0; }
    else if (key === 'ArrowDown'  && snake.dy === 0) { snake.dy = grid;  snake.dx = 0; }
  }, { passive: false });

  // touch: swipe (bra på iPad)
  let touchStart = null;
  function resetSwipeInput(){ touchStart = null; }

  canvas.addEventListener('touchstart', (e) => {
    if (inputLock.blocked('touchstart')) return;
    const t = e.changedTouches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (inputLock.blocked('touchend')) return;
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;

    const ax = Math.abs(dx);
    const ay = Math.abs(dy);
    if (Math.max(ax, ay) < 18) return; // lite sveip

    if (ax > ay) {
      if (dx < 0 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; }
      else if (dx > 0 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; }
    } else {
      if (dy < 0 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; }
      else if (dy > 0 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; }
    }
    resetSwipeInput();
  }, { passive: true });
  canvas.addEventListener('touchcancel', resetSwipeInput, { passive: true });
  window.addEventListener('touchend', resetSwipeInput, { passive: true });
  window.addEventListener('touchcancel', resetSwipeInput, { passive: true });

  // restart button
  document.getElementById('restart').addEventListener('click', reset);
  document.getElementById('uiPauseBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.toggle('topbar');
  });
  document.getElementById('uiRestartBtn').addEventListener('click', restartGame);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.resume('overlay');
  });
  document.getElementById('hintOkBtn').addEventListener('click', () => {
    softVibrate(12);
    localStorage.setItem(hintKey, '1');
    hintOverlay.classList.add('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'true');
  });

  // start
  reset();
  showHintIfNeeded();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
