<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>2048 | Alma.rocks</title>
  <style>
    :root{
      --neon-pink: #ff006e;
      --neon-cyan: #00f5ff;
      --neon-yellow: #ffff00;
      --neon-purple: #b537f2;
      --neon-green: #39ff14;
      --dark-bg: #0a0e27;
      --bg:#0b1020;--text:#e9ecff;--muted:#a9b1d6;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.12);--btnbg:rgba(255,255,255,.06);--accent:#7aa2f7;--danger:#f7768e;
    }
    body{margin:0;background:var(--dark-bg);color:var(--text);font-family:'Orbitron', monospace, system-ui;}
    .ui-topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-start;padding:calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 10px calc(12px + env(safe-area-inset-left));border-bottom:3px solid var(--neon-cyan);background:rgba(0, 245, 255, 0.08);box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);position:sticky;top:0;z-index:40}
    .ui-btn{border:2px solid var(--neon-cyan);background:var(--neon-cyan);color:#000;padding:10px 14px;border-radius:0;font-weight:800;cursor:pointer;user-select:none;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:44px;min-width:44px;touch-action:manipulation;text-transform:uppercase;letter-spacing:1px;box-shadow: 0 0 25px rgba(0, 245, 255, 0.8);font-family: 'Orbitron', monospace;}
    .ui-btn:focus-visible,button:focus-visible,.topbar a:focus-visible{outline:3px solid var(--neon-yellow);outline-offset:2px}
    .ui-overlay{position:fixed;inset:0;background:rgba(6,9,21,.8);display:flex;align-items:center;justify-content:center;z-index:30;padding:16px}
    .ui-card{background:rgba(11,16,32,.96);border:2px solid var(--neon-pink);border-radius:0;padding:16px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 40px rgba(255,0,110,0.5)}
    .ui-card h2{margin:0 0 10px 0;font-size:28px;color:var(--neon-pink);text-shadow: 0 0 20px var(--neon-pink)}
    .ui-card p{margin:0 0 12px 0;color:var(--neon-cyan);text-transform:uppercase;letter-spacing:1px}
    .ui-hidden{display:none}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:3px solid var(--neon-cyan);background:rgba(0, 245, 255, 0.08);box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);position:sticky;top:0;z-index:10}
    .topbar .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .topbar a{text-decoration:none;color:#000;background:var(--neon-cyan);border:2px solid var(--neon-cyan);padding:8px 12px;border-radius:0;user-select:none;font-weight:800;text-transform:uppercase;letter-spacing:1px;box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);}
    .topbar .label{color:var(--neon-cyan);font-size:13px}
    .wrap{display:grid;grid-template-columns: 1fr minmax(220px,260px);gap:14px;padding:14px;width:min(980px,96vw);margin:0 auto;align-items:start}
    .panel{background:rgba(255,0,110, 0.06);border:2px solid var(--neon-pink);border-radius:0;padding:12px;box-shadow: 0 0 30px rgba(255,0,110, 0.3);}
    h1{margin:0 0 8px 0;font-size:20px;color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); text-transform: uppercase; letter-spacing: 2px;}
    .stat{display:flex;justify-content:space-between;color:var(--neon-cyan);padding:6px 0;border-bottom:1px dashed rgba(0, 245, 255, 0.3)}
    .stat:last-child{border-bottom:none}
    .big{font-weight:800;color:var(--neon-yellow);font-size:1.2em}
    .controls{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
    button{border:2px solid var(--neon-cyan);background: rgba(0, 245, 255, 0.1);color: var(--neon-cyan);padding:12px 10px;border-radius:0;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;text-transform: uppercase;letter-spacing: 1px;box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);font-family: 'Orbitron', monospace;}
    button:active{transform:translateY(1px)}
    .primary{background:var(--neon-green); color:#000; border-color: var(--neon-green); box-shadow: 0 0 25px rgba(57, 255, 20, 0.8);}
    .danger{background: rgba(255,0,110,.16); border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,110, 0.5);}
    .board{
      width: min(420px, 90vw);
      aspect-ratio: 1 / 1;
      margin: 0 auto;
      background: rgba(0, 245, 255, 0.05);
      border: 3px solid var(--neon-green);
      border-radius: 0;
      padding: 10px;
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      touch-action: none;
      user-select:none;
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
    }
    .cell{
      border-radius: 0;
      display:flex;align-items:center;justify-content:center;
      font-weight: 900;
      font-size: clamp(18px, 4vw, 34px);
      background: rgba(181, 55, 242, 0.1);
      border: 2px solid var(--neon-purple);
      color: var(--neon-yellow);
      text-shadow: 0 0 15px var(--neon-yellow);
      box-shadow: inset 0 0 10px rgba(181, 55, 242, 0.2);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .cell[data-value="2"] { border-color: var(--neon-cyan); background: rgba(0, 245, 255, 0.15); box-shadow: 0 0 20px rgba(0, 245, 255, 0.4), inset 0 0 10px rgba(0, 245, 255, 0.2); }
    .cell[data-value="4"] { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.15); box-shadow: 0 0 20px rgba(57, 255, 20, 0.4), inset 0 0 10px rgba(57, 255, 20, 0.2); }
    .cell[data-value="8"] { border-color: var(--neon-yellow); background: rgba(255, 255, 0, 0.1); box-shadow: 0 0 20px rgba(255, 255, 0, 0.4), inset 0 0 10px rgba(255, 255, 0, 0.2); }
    .cell[data-value="16"] { border-color: var(--neon-pink); background: rgba(255, 0, 110, 0.15); box-shadow: 0 0 20px rgba(255, 0, 110, 0.4), inset 0 0 10px rgba(255, 0, 110, 0.2); }
    .cell[data-value="32"] { border-color: var(--neon-purple); background: rgba(181, 55, 242, 0.2); box-shadow: 0 0 20px rgba(181, 55, 242, 0.5), inset 0 0 10px rgba(181, 55, 242, 0.3); }
    .cell[data-value="64"] { border-color: var(--neon-cyan); background: rgba(0, 245, 255, 0.15); box-shadow: 0 0 25px rgba(0, 245, 255, 0.6), inset 0 0 10px rgba(0, 245, 255, 0.3); }
    .cell[data-value="128"] { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.15); box-shadow: 0 0 25px rgba(57, 255, 20, 0.6), inset 0 0 10px rgba(57, 255, 20, 0.3); }
    .cell[data-value="256"] { border-color: var(--neon-yellow); background: rgba(255, 255, 0, 0.15); box-shadow: 0 0 25px rgba(255, 255, 0, 0.6), inset 0 0 10px rgba(255, 255, 0, 0.3); }
    .cell[data-value="512"] { border-color: var(--neon-pink); background: rgba(255, 0, 110, 0.15); box-shadow: 0 0 25px rgba(255, 0, 110, 0.6), inset 0 0 10px rgba(255, 0, 110, 0.3); }
    .cell[data-value="1024"] { border-color: var(--neon-purple); background: rgba(181, 55, 242, 0.25); box-shadow: 0 0 30px rgba(181, 55, 242, 0.7), inset 0 0 10px rgba(181, 55, 242, 0.4); }
    .cell[data-value="2048"] { border-color: var(--neon-cyan); background: rgba(0, 245, 255, 0.2); box-shadow: 0 0 40px rgba(0, 245, 255, 0.8), inset 0 0 15px rgba(0, 245, 255, 0.4); }
    .hint{color:var(--neon-cyan);font-size:13px;line-height:1.35;margin-top:10px;text-transform:uppercase;letter-spacing:0.5px;}
    @media (max-width: 820px){.wrap{grid-template-columns:1fr}.board{width:min(420px, 96vw)}}
  </style>
</head>
<body>
  <div class="ui-topbar" role="navigation" aria-label="Spillkontroller">
    <a class="ui-btn" href="/spill/">⬅️ Spillmeny</a>
    <button class="ui-btn" id="uiRestartBtn" type="button">🔄 Start på nytt</button>
    <button class="ui-btn" id="uiPauseBtn" type="button">⏸️ Pause</button>
  </div>

  <div class="ui-overlay ui-hidden" id="pauseOverlay" aria-hidden="true">
    <div class="ui-card">
      <h2>Pauset</h2>
      <button class="ui-btn" id="resumeBtn" type="button">Fortsett</button>
    </div>
  </div>

  <div class="ui-overlay ui-hidden" id="hintOverlay" aria-hidden="true">
    <div class="ui-card">
      <p>Tips: Sveip for å flytte brikker.</p>
      <button class="ui-btn" id="hintOkBtn" type="button">OK</button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="board" id="board" aria-label="2048 board"></div>
    </div>

    <div class="panel">
      <h1>🔢 2048</h1>
      <div class="stat"><span>Score</span><span class="big" id="score">0</span></div>
      <div class="stat"><span>Beste</span><span class="big" id="best">0</span></div>
      <div class="stat"><span>Status</span><span class="big" id="status">Klar</span></div>

      <div class="controls">
        <button id="new" class="primary">Nytt spill</button>
        <button id="undo">Angre (1)</button>
        <button id="hint" class="danger">Tips</button>
        <button id="keys">Piltaster</button>
      </div>

      <div class="hint">
        Sveip opp/ned/venstre/høyre på brettet.<br/>
        Mål: lag en 2048-brikke. (Barnemodus: vi kan også sette mål = 512 hvis du vil.)
      </div>
    </div>
  </div>

<script src="../shared/game-runtime-utils.js"></script>
<script>
(() => {
  const gameId = '2048';
  const DEBUG = false;
  const debugLog = window.AlmaGameUtils.createDebugLogger(gameId, DEBUG);
  const hintKey = `alma:hintSeen:${gameId}`;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const statusEl= document.getElementById('status');
  const undoBtn = document.getElementById('undo');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const hintOverlay = document.getElementById('hintOverlay');
  const uiPauseBtn = document.getElementById('uiPauseBtn');

  const BEST_KEY = 'alma_2048_best';
  let best = Number(localStorage.getItem(BEST_KEY) || 0);
  bestEl.textContent = best;

  let grid = Array.from({length:4}, () => Array(4).fill(0));
  let score = 0;
  let undo = null; // {grid, score}
  let canUndo = true;
  let paused = false;

  function softVibrate(ms = 12){
    if (navigator.vibrate) navigator.vibrate(ms);
  }

  function setPaused(value) {
    paused = Boolean(value);
    pauseOverlay.classList.toggle('ui-hidden', !paused);
    pauseOverlay.setAttribute('aria-hidden', paused ? 'false' : 'true');
    uiPauseBtn.textContent = paused ? '▶️ Fortsett' : '⏸️ Pause';
    setStatus(paused ? 'Pauset' : 'Spiller');
  }

  function restartGame() {
    softVibrate(16);
    setPaused(false);
    newGame();
  }

  function showHintIfNeeded() {
    if (localStorage.getItem(hintKey) === '1') return;
    hintOverlay.classList.remove('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'false');
  }

  const inputLock = window.AlmaGameUtils.createInputLock({
    gameId,
    debug: DEBUG,
    overlayElement: pauseOverlay,
    isLocked: () => paused
  });

  const pauseController = window.AlmaGameUtils.createPauseVisibilityController({
    gameId,
    debug: DEBUG,
    isPaused: () => paused,
    setPaused,
    canPause: () => true
  });

  function setStatus(s){ statusEl.textContent = s; }
  function updateHUD(){
    scoreEl.textContent = String(score);
    bestEl.textContent = String(best);
    undoBtn.textContent = canUndo && undo ? "Angre (1)" : "Angre (0)";
    undoBtn.disabled = !(canUndo && undo);
    undoBtn.style.opacity = undoBtn.disabled ? 0.5 : 1;
  }

  function emptyCells(){
    const out = [];
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]===0) out.push([r,c]);
    return out;
  }

  function addTile(){
    const empties = emptyCells();
    if(!empties.length) return false;
    const [r,c] = empties[(Math.random()*empties.length)|0];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return true;
  }

  function cloneGrid(g){ return g.map(row => row.slice()); }

  function render(){
    boardEl.innerHTML = "";
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        const v = grid[r][c];
        const el = document.createElement('div');
        el.className = 'cell';
        el.textContent = v ? String(v) : "";
        el.style.background = tileBg(v);
        el.style.borderColor = 'rgba(255,255,255,.10)';
        el.style.color = v >= 8 ? '#0b1020' : '#e9ecff';
        boardEl.appendChild(el);
      }
    }
    updateHUD();
  }

  function tileBg(v){
    if (!v) return 'rgba(255,255,255,.04)';
    const map = {
      2:'#7aa2f7', 4:'#2ac3de', 8:'#9ece6a', 16:'#e0af68',
      32:'#ff9e64', 64:'#f7768e', 128:'#bb9af7', 256:'#7dcfff',
      512:'#a6e3a1', 1024:'#f2cdcd', 2048:'#ffd866'
    };
    return map[v] || '#ffd866';
  }

  function compress(line){
    const a = line.filter(v=>v!==0);
    while(a.length<4) a.push(0);
    return a;
  }

  function merge(line){
    for(let i=0;i<3;i++){
      if(line[i]!==0 && line[i]===line[i+1]){
        line[i] *= 2;
        score += line[i];
        line[i+1] = 0;
      }
    }
    return line;
  }

  function move(dir){
    if (inputLock.blocked('move', { dir })) return;
    const before = cloneGrid(grid);
    const beforeScore = score;

    // save undo only if we actually move
    let moved = false;

    function getLine(i){
      if(dir==='left')  return grid[i].slice();
      if(dir==='right') return grid[i].slice().reverse();
      if(dir==='up')    return [grid[0][i],grid[1][i],grid[2][i],grid[3][i]];
      if(dir==='down')  return [grid[0][i],grid[1][i],grid[2][i],grid[3][i]].reverse();
    }

    function setLine(i, line){
      if(dir==='left'){
        for(let c=0;c<4;c++) grid[i][c]=line[c];
      } else if(dir==='right'){
        line = line.reverse();
        for(let c=0;c<4;c++) grid[i][c]=line[c];
      } else if(dir==='up'){
        for(let r=0;r<4;r++) grid[r][i]=line[r];
      } else if(dir==='down'){
        line = line.reverse();
        for(let r=0;r<4;r++) grid[r][i]=line[r];
      }
    }

    for(let i=0;i<4;i++){
      let line = getLine(i);
      const original = line.slice();
      line = compress(line);
      line = merge(line);
      line = compress(line);
      if(line.join(',') !== original.join(',')) moved = true;
      setLine(i, line);
    }

    if(!moved){
      score = beforeScore;
      setStatus("Ingen flytt");
      return;
    }

    // store undo
    undo = { grid: before, score: beforeScore };
    canUndo = true;

    addTile();

    // best
    if(score > best){ best = score; localStorage.setItem(BEST_KEY, String(best)); }

    setStatus("Spiller");
    render();

    if (has2048()) setStatus("🎉 2048!");
    else if (!movesAvailable()) setStatus("Game Over");
  }

  function has2048(){
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c] >= 2048) return true;
    return false;
  }

  function movesAvailable(){
    if (emptyCells().length) return true;
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        const v = grid[r][c];
        if (r<3 && grid[r+1][c]===v) return true;
        if (c<3 && grid[r][c+1]===v) return true;
      }
    }
    return false;
  }

  function newGame(){
    grid = Array.from({length:4}, () => Array(4).fill(0));
    score = 0;
    undo = null;
    canUndo = true;
    addTile(); addTile();
    setStatus("Klar");
    render();
  }

  function doUndo(){
    if(!(canUndo && undo)) return;
    grid = cloneGrid(undo.grid);
    score = undo.score;
    undo = null;
    canUndo = false; // only once
    setStatus("Angret");
    render();
  }

  // Swipe / pointer
  let start = null;
  const board = document.getElementById('board');
  function resetSwipeInput(){ start = null; }

  board.addEventListener('pointerdown', (e) => {
    board.setPointerCapture(e.pointerId);
    start = { x: e.clientX, y: e.clientY };
  });

  board.addEventListener('pointerup', (e) => {
    if(!start) return;
    const dx = e.clientX - start.x;
    const dy = e.clientY - start.y;
    start = null;

    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 18) return;

    if (ax > ay){
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  });
  board.addEventListener('pointercancel', resetSwipeInput);
  board.addEventListener('lostpointercapture', resetSwipeInput);
  window.addEventListener('pointerup', resetSwipeInput);
  window.addEventListener('pointercancel', resetSwipeInput);

  // Keyboard (for desktop)
  document.addEventListener('keydown', (e) => {
    const t = e.target;
    const isTextInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    if (!isTextInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
    }
    if (inputLock.blocked('keydown', { key: e.key })) return;
    if (e.key === 'ArrowLeft') move('left');
    else if (e.key === 'ArrowRight') move('right');
    else if (e.key === 'ArrowUp') move('up');
    else if (e.key === 'ArrowDown') move('down');
  }, { passive: false });

  document.getElementById('uiPauseBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.toggle('topbar');
  });
  document.getElementById('uiRestartBtn').addEventListener('click', restartGame);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.resume('overlay');
  });
  document.getElementById('hintOkBtn').addEventListener('click', () => {
    softVibrate(12);
    localStorage.setItem(hintKey, '1');
    hintOverlay.classList.add('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'true');
  });

  document.getElementById('new').addEventListener('click', newGame);
  document.getElementById('undo').addEventListener('click', doUndo);
  document.getElementById('hint').addEventListener('click', () => setStatus("Tips: hold hjørnet med store tall 🙂"));
  document.getElementById('keys').addEventListener('click', () => setStatus("Desktop: bruk piltaster"));

  newGame();
  showHintIfNeeded();
})();
</script>
</body>
</html>
