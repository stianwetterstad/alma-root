<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spill | Alma.rocks</title>
  <style>
    :root{
      --bg:#0b1020; --card:#121a33; --text:#e9ecff; --muted:#a9b1d6;
      --accent:#7aa2f7; --accent2:#9ece6a; --danger:#f7768e;
      --border: rgba(255,255,255,.10);
      --border2: rgba(255,255,255,.12);
      --btnbg: rgba(255,255,255,.06);
      --radius:16px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --max: 980px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      background:
        radial-gradient(1200px 600px at 15% 10%, #1a2a6b33, transparent),
        radial-gradient(1000px 700px at 90% 30%, #7aa2f733, transparent),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .wrap{ width: min(var(--max), 92vw); padding: 18px 0 40px; }

    /* Toppmeny */
    .topbar{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      position: sticky;
      top: 10px;
      z-index: 10;
      backdrop-filter: blur(6px);
    }
    .topbar .left{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .topbar a{
      text-decoration:none;
      color:var(--text);
      background: var(--btnbg);
      border:1px solid var(--border2);
      padding:8px 12px;
      border-radius:999px;
      user-select:none;
      box-shadow: 0 6px 18px rgba(0,0,0,.20);
      transition: transform .08s ease, background .2s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
      touch-action: manipulation;
      min-height: 44px;
    }
    .topbar a:hover{ background: rgba(255,255,255,.10); }
    .topbar a:active{ transform: translateY(1px); }
    .topbar .label{ color:var(--muted); font-size:13px; }

    header{
      margin: 18px 2px 14px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
    }
    h1{ margin:0; font-size: clamp(22px, 3vw, 34px); letter-spacing: .3px; }
    .sub{ color: var(--muted); font-size: 13px; line-height: 1.35; max-width: 56ch; }

    /* Fortsett-blokk */
    .continue-block{
      background: linear-gradient(135deg, rgba(158, 206, 106, .15), rgba(122, 162, 247, .15));
      border: 1px solid rgba(158, 206, 106, .3);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .continue-block .left{ flex: 1; min-width: 150px; }
    .continue-block .left div:first-child{
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .continue-block .left div:last-child{
      font-weight: 700;
      font-size: 16px;
      color: var(--accent2);
    }
    .continue-block .right{
      display: flex;
      gap: 10px;
    }
    .continue-block a{
      border-radius: 12px;
      padding: 11px 16px;
      text-decoration: none;
      color: #0b1020;
      background: var(--accent2);
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 24px rgba(158, 206, 106, .3);
      transition: transform .08s ease, opacity .2s ease;
      touch-action: manipulation;
      min-height: 44px;
      font-size: 14px;
    }
    .continue-block a:hover{ opacity: 0.9; }
    .continue-block a:active{ transform: translateY(1px); }

    /* Filter-knapper */
    .filters{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      margin-top: 16px;
    }
    .filter-btn{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s ease;
      touch-action: manipulation;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .filter-btn:hover{ background: rgba(255,255,255,.10); }
    .filter-btn.active{
      background: var(--accent);
      color: #0b1020;
      border-color: var(--accent);
      font-weight: 700;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap:14px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      position:relative;
      overflow:hidden;
      transition: all .2s ease;
    }
    .card.hidden{ display: none; }
    .card::before{
      content:"";
      position:absolute; inset:-60px -60px auto auto;
      width:160px; height:160px;
      background: radial-gradient(circle at 30% 30%, rgba(122,162,247,.28), transparent 60%);
      transform: rotate(18deg);
      pointer-events:none;
    }

    .card-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title{
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 20px;
    }
    .card-title-emoji{ font-size: 24px; }
    .favorite-btn{
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      transition: transform .15s ease;
      touch-action: manipulation;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .favorite-btn:hover{ transform: scale(1.15); }
    .favorite-btn:active{ transform: scale(0.95); }

    .card p{ margin:0; color:var(--muted); line-height:1.35; font-size: 14px; }

    .card-stats{
      display: flex;
      gap: 12px;
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .stat-item{
      display: flex;
      flex-direction: column;
    }
    .stat-label{
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 2px;
    }
    .stat-value{
      font-weight: 600;
      color: var(--accent2);
    }

    .play{
      margin-top:auto;
      display:flex;
      gap:10px;
    }
    .play a{
      flex: 1;
      border-radius: 12px;
      padding:11px 12px;
      text-decoration:none;
      color:#0b1020;
      background: var(--accent);
      font-weight: 800;
      display:inline-flex;
      align-items:center;
      justify-content: center;
      gap:8px;
      box-shadow: 0 10px 24px rgba(122,162,247,.25);
      transition: transform .08s ease, opacity .2s ease;
      touch-action: manipulation;
      min-height: 44px;
      font-size: 14px;
    }
    .play a:hover{ opacity: 0.9; }
    .play a:active{ transform: translateY(1px); }

    footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="left">
        <a href="/" aria-label="Tilbake til Alma.rocks">← Alma.rocks</a>
      </div>
      <div class="label">Spillmeny</div>
    </div>

    <header>
      <div>
        <h1>🎮 Spill</h1>
        <div class="sub">
          Velg et spill! Alle er laget for å fungere bra på iPad (touch/knapper), og også på PC med tastatur.
        </div>
      </div>
    </header>

    <div id="continueContainer"></div>

    <div class="filters" id="filterContainer"></div>

    <div class="grid" id="gamesContainer"></div>

    <footer>
      Tips: På iPad kan det hjelpe å legge siden til på hjemskjermen (Del → "Legg til på Hjem-skjerm") for en mer "app"-følelse.
    </footer>
  </div>

  <script>
    // Spill-data
    const games = [
      {
        name: "Snake",
        emoji: "🐍",
        path: "/spill/snake/",
        description: "Samle epler 🍎 og unngå å krasje i deg selv. Klassikeren!",
        category: "Klassikere"
      },
      {
        name: "Tetris",
        emoji: "🧱",
        path: "/spill/tetris/",
        description: "Roter brikker og lag linjer. Øker i fart etter hvert.",
        category: "Klassikere"
      },
      {
        name: "Space Invaders",
        emoji: "👾",
        path: "/spill/space-invaders/",
        description: "Skyt invaderne før de når bunnen. Pass på livene!",
        category: "Action"
      },
      {
        name: "Breakout",
        emoji: "🏓",
        path: "/spill/breakout/",
        description: "Dra fingeren for å styre plata og knus alle klossene!",
        category: "Action"
      },
      {
        name: "Memory",
        emoji: "🧠",
        path: "/spill/memory/",
        description: "Finn like par! Rolig og supert på touch.",
        category: "Rolig"
      },
      {
        name: "2048",
        emoji: "🔢",
        path: "/spill/2048/",
        description: "Sveip for å slå sammen tall. Klarer du 2048?",
        category: "Rolig"
      },
      {
        name: "Kosekaos",
        emoji: "🏡",
        path: "/spill/kosekaos/",
        description: "Lag figur, velg hus og pynt rommet ditt for poeng.",
        category: "Rolig"
      }
    ];

    const categories = ["Alle", "Rolig", "Action", "Klassikere"];

    // Hent data fra localStorage
    function getLocalStorage() {
      return {
        favorites: JSON.parse(localStorage.getItem("games_favorites") || "[]"),
        lastPlayed: localStorage.getItem("games_lastPlayed"),
        stats: JSON.parse(localStorage.getItem("games_stats") || "{}"),
        filter: localStorage.getItem("games_filter") || "Alle"
      };
    }

    // Lagre data til localStorage
    function saveLocalStorage(data) {
      localStorage.setItem("games_favorites", JSON.stringify(data.favorites));
      localStorage.setItem("games_lastPlayed", data.lastPlayed);
      localStorage.setItem("games_stats", JSON.stringify(data.stats));
      localStorage.setItem("games_filter", data.filter);
    }

    // Formatere dato
    function formatDate(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return "akkurat nå";
      if (diffMins < 60) return `${diffMins}m siden`;
      if (diffHours < 24) return `${diffHours}t siden`;
      if (diffDays === 1) return "i går";
      if (diffDays < 7) return `${diffDays}d siden`;
      
      return date.toLocaleDateString("no-NO", { month: "short", day: "numeric" });
    }

    // Sorter spill (favoritter først, så alfabetisk)
    function sortGames(gamesList, favorites) {
      return gamesList.sort((a, b) => {
        const aFav = favorites.includes(a.path) ? 0 : 1;
        const bFav = favorites.includes(b.path) ? 0 : 1;
        if (aFav !== bFav) return aFav - bFav;
        return a.name.localeCompare(b.name);
      });
    }

    // Filtrer og render spillkort
    function renderGames(filter = "Alle") {
      const data = getLocalStorage();
      const container = document.getElementById("gamesContainer");
      container.innerHTML = "";

      let filtered = games;
      if (filter !== "Alle") {
        filtered = games.filter(g => g.category === filter);
      }

      const sorted = sortGames(filtered, data.favorites);

      sorted.forEach(game => {
        const stat = data.stats[game.path] || {};
        const isFav = data.favorites.includes(game.path);
        const card = document.createElement("section");
        card.className = "card";
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">
              <span class="card-title-emoji">${game.emoji}</span>
              <span>${game.name}</span>
            </div>
            <button class="favorite-btn" data-path="${game.path}" title="Favoritt">
              ${isFav ? "⭐" : "☆"}
            </button>
          </div>
          <p>${game.description}</p>
          <div class="card-stats">
            <div class="stat-item">
              <div class="stat-label">Best</div>
              <div class="stat-value">${stat.bestScore || "—"}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Sist spilt</div>
              <div class="stat-value">${formatDate(stat.lastPlayedAt)}</div>
            </div>
          </div>
          <div class="play">
            <a href="${game.path}" data-game-path="${game.path}" class="play-btn">Spill ${game.name} →</a>
          </div>
        `;
        container.appendChild(card);

        // Event-listener for favoritt
        card.querySelector(".favorite-btn").addEventListener("click", (e) => {
          e.preventDefault();
          toggleFavorite(game.path);
          renderGames(filter);
        });

        // Event-listener for "Spill"-knapp
        card.querySelector(".play-btn").addEventListener("click", (e) => {
          e.preventDefault();
          playGame(game.path, game.name);
        });
      });
    }

    // Toggle favoritt
    function toggleFavorite(gamePath) {
      const data = getLocalStorage();
      const idx = data.favorites.indexOf(gamePath);
      if (idx > -1) {
        data.favorites.splice(idx, 1);
      } else {
        data.favorites.push(gamePath);
      }
      saveLocalStorage(data);
    }

    // Spill spill
    function playGame(gamePath, gameName) {
      const data = getLocalStorage();
      const now = new Date().toISOString();
      
      if (!data.stats[gamePath]) {
        data.stats[gamePath] = {};
      }
      data.stats[gamePath].lastPlayedAt = now;
      data.lastPlayed = gamePath;
      
      saveLocalStorage(data);
      window.location.href = gamePath;
    }

    // Render "Fortsett"-blokk
    function renderContinueBlock() {
      const data = getLocalStorage();
      const container = document.getElementById("continueContainer");
      
      if (!data.lastPlayed) {
        container.innerHTML = "";
        return;
      }

      const game = games.find(g => g.path === data.lastPlayed);
      if (!game) {
        container.innerHTML = "";
        return;
      }

      const stat = data.stats[data.lastPlayed] || {};
      const timeStr = formatDate(stat.lastPlayedAt);

      container.innerHTML = `
        <div class="continue-block">
          <div class="left">
            <div>Sist spilt</div>
            <div>${game.emoji} ${game.name} (${timeStr})</div>
          </div>
          <div class="right">
            <a href="${game.path}" data-continue-btn="true" class="continue-play-btn">▶ Fortsett</a>
          </div>
        </div>
      `;

      container.querySelector(".continue-play-btn").addEventListener("click", (e) => {
        e.preventDefault();
        playGame(data.lastPlayed, game.name);
      });
    }

    // Render filter-knapper
    function renderFilters(activeFilter = "Alle") {
      const container = document.getElementById("filterContainer");
      container.innerHTML = "";

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = `filter-btn ${cat === activeFilter ? "active" : ""}`;
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          const data = getLocalStorage();
          data.filter = cat;
          saveLocalStorage(data);
          renderFilters(cat);
          renderGames(cat);
        });
        container.appendChild(btn);
      });
    }

    // Init
    function init() {
      const data = getLocalStorage();
      renderFilters(data.filter);
      renderGames(data.filter);
      renderContinueBlock();
    }

    init();
  </script>
</body>
</html>
