<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spill | Alma.rocks</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @keyframes neonGlow {
      0%, 100% { text-shadow: 0 0 10px #ff006e, 0 0 20px #ff006e, 0 0 30px #ff006e; }
      50% { text-shadow: 0 0 15px #ff006e, 0 0 30px #ff006e, 0 0 45px #ff006e; }
    }
    @keyframes arcadeFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes scanlines {
      0% { transform: translateY(0); }
      100% { transform: translateY(10px); }
    }

    :root{
      --neon-pink: #ff006e;
      --neon-cyan: #00f5ff;
      --neon-yellow: #ffff00;
      --neon-purple: #b537f2;
      --neon-green: #39ff14;
      --bg: #0a0e27;
      --card: #1a1f3a;
      --text: #ffffff;
      --muted: #a0aec0;
      --accent: #ff006e;
      --accent2: #00f5ff;
      --danger: #ff0040;
      --border: rgba(255, 0, 110, 0.3);
      --border2: rgba(0, 245, 255, 0.3);
      --btnbg: rgba(255, 0, 110, 0.1);
      --radius: 8px;
      --shadow: 0 0 20px rgba(255, 0, 110, 0.4), 0 0 40px rgba(0, 245, 255, 0.2);
      --max: 1200px;
      font-family: 'Orbitron', 'Courier New', monospace;
    }

    body{
      margin:0;
      background:
        linear-gradient(45deg, rgba(255, 0, 110, 0.05) 1px, transparent 1px),
        linear-gradient(-45deg, rgba(0, 245, 255, 0.05) 1px, transparent 1px),
        #0a0e27;
      background-size: 30px 30px;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Scanlines effect overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1;
    }
    .wrap{
      width: min(var(--max), 95vw);
      padding: 24px 0 40px;
      position: relative;
      z-index: 2;
    }

    /* Toppmeny */
    .topbar{
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border: 3px solid var(--neon-cyan);
      border-radius: 4px;
      background: rgba(0, 245, 255, 0.05);
      position: sticky;
      top: 10px;
      z-index: 10;
      box-shadow: inset 0 0 20px rgba(0, 245, 255, 0.2), 0 0 20px rgba(0, 245, 255, 0.3);
    }
    .topbar .left{
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .topbar a{
      text-decoration: none;
      color: #000;
      background: var(--neon-cyan);
      border: 2px solid var(--neon-cyan);
      padding: 10px 16px;
      border-radius: 0;
      user-select: none;
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.6);
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      touch-action: manipulation;
      min-height: 44px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .topbar a:hover{
      box-shadow: 0 0 30px rgba(0, 245, 255, 1), inset 0 0 10px rgba(0, 245, 255, 0.5);
      transform: scale(1.05);
    }
    .topbar a:active{
      transform: scale(0.98);
    }
    .topbar .label{
      color: var(--neon-cyan);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      animation: neonGlow 2s ease-in-out infinite;
    }

    header{
      margin: 32px 0 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }
    h1{
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--neon-pink);
      text-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-purple);
      animation: arcadeFlash 3s ease-in-out infinite;
    }
    .sub{
      color: var(--neon-cyan);
      font-size: 14px;
      line-height: 1.6;
      max-width: 56ch;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    /* Fortsett-blokk */
    .continue-block{
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.15), rgba(181, 55, 242, 0.15));
      border: 3px solid var(--neon-pink);
      border-radius: 4px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.4), inset 0 0 20px rgba(255, 0, 110, 0.1);
    }
    .continue-block .left{
      flex: 1;
      min-width: 150px;
    }
    .continue-block .left div:first-child{
      font-size: 12px;
      color: var(--neon-cyan);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .continue-block .left div:last-child{
      font-weight: 900;
      font-size: 20px;
      color: var(--neon-yellow);
      text-shadow: 0 0 10px var(--neon-yellow);
      text-transform: uppercase;
    }
    .continue-block .right{
      display: flex;
      gap: 10px;
    }
    .continue-block a{
      border-radius: 0;
      padding: 12px 24px;
      text-decoration: none;
      color: #000;
      background: var(--neon-yellow);
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 20px rgba(255, 255, 0, 0.6);
      transition: all 0.15s ease;
      touch-action: manipulation;
      min-height: 44px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .continue-block a:hover{
      box-shadow: 0 0 40px rgba(255, 255, 0, 1), inset 0 0 15px rgba(255, 255, 0, 0.5);
      transform: scale(1.08);
    }
    .continue-block a:active{
      transform: scale(0.95);
    }

    /* Filter-knapper */
    .filters{
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      margin-top: 24px;
    }
    .filter-btn{
      border: 2px solid rgba(0, 245, 255, 0.4);
      background: rgba(0, 245, 255, 0.05);
      color: var(--text);
      padding: 11px 18px;
      border-radius: 0;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .filter-btn:hover{
      border-color: var(--neon-cyan);
      background: rgba(0, 245, 255, 0.15);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
    }
    .filter-btn.active{
      background: var(--neon-cyan);
      color: #000;
      border-color: var(--neon-cyan);
      font-weight: 900;
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.6), inset 0 0 10px rgba(0, 245, 255, 0.3);
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card{
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(181, 55, 242, 0.1));
      border: 3px solid var(--neon-pink);
      border-radius: 4px;
      padding: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 20px rgba(255, 0, 110, 0.3), inset 0 0 15px rgba(255, 0, 110, 0.05);
      animation: floatUp 3s ease-in-out infinite;
    }
    .card:nth-child(even) {
      animation-delay: 0.2s;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), inset 0 0 15px rgba(0, 245, 255, 0.05);
    }
    .card:nth-child(3n) {
      animation-delay: 0.4s;
      border-color: var(--neon-purple);
      box-shadow: 0 0 20px rgba(181, 55, 242, 0.3), inset 0 0 15px rgba(181, 55, 242, 0.05);
    }
    .card.hidden{ display: none; }

    .card-image{
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.2), rgba(181, 55, 242, 0.2));
      object-fit: contain;
      object-position: center;
      border-bottom: 3px solid inherit;
      position: relative;
      padding: 12px 0;
      box-sizing: border-box;
    }
    .card:nth-child(even) .card-image {
      border-bottom-color: var(--neon-cyan);
    }
    .card:nth-child(3n) .card-image {
      border-bottom-color: var(--neon-purple);
    }

    .card-body{
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .card-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-title{
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card-title-emoji{
      font-size: 32px;
      display: inline-block;
    }
    .favorite-btn{
      background: none;
      border: 2px solid rgba(255, 0, 110, 0.4);
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: rgba(255, 0, 110, 0.05);
    }
    .favorite-btn:hover{
      border-color: var(--neon-pink);
      box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
      transform: scale(1.15);
    }
    .favorite-btn:active{
      transform: scale(0.95);
    }

    .card p{
      margin: 0;
      color: var(--neon-cyan);
      line-height: 1.5;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-stats{
      display: flex;
      gap: 16px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-item{
      display: flex;
      flex-direction: column;
    }
    .stat-label{
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 2px;
      color: var(--neon-cyan);
    }
    .stat-value{
      font-weight: 900;
      color: var(--neon-yellow);
      text-shadow: 0 0 10px var(--neon-yellow);
    }

    .play{
      margin-top: auto;
      display: flex;
      gap: 10px;
    }
    .play a{
      flex: 1;
      border-radius: 0;
      padding: 13px 12px;
      text-decoration: none;
      color: #000;
      background: var(--neon-green);
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
      transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
      touch-action: manipulation;
      min-height: 44px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 2px solid var(--neon-green);
    }
    .play a:hover{
      box-shadow: 0 0 40px rgba(57, 255, 20, 1), inset 0 0 15px rgba(57, 255, 20, 0.4);
      transform: translateY(-3px);
    }
    .play a:active{
      transform: translateY(1px);
    }

    .card:hover {
      transform: translateY(-12px) scale(1.02);
      box-shadow: 0 0 40px rgba(255, 0, 110, 0.6), 0 20px 60px rgba(255, 0, 110, 0.3);
    }
    .card:nth-child(even):hover {
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.6), 0 20px 60px rgba(0, 245, 255, 0.3);
    }
    .card:nth-child(3n):hover {
      box-shadow: 0 0 40px rgba(181, 55, 242, 0.6), 0 20px 60px rgba(181, 55, 242, 0.3);
    }

    footer{
      margin-top: 28px;
      color: var(--neon-cyan);
      font-size: 13px;
      line-height: 1.6;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-top: 2px solid rgba(0, 245, 255, 0.3);
      padding-top: 18px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="left">
        <a href="/" aria-label="Tilbake til Alma.rocks">← Alma.rocks</a>
      </div>
      <div class="label">Spillmeny</div>
    </div>

    <header>
      <div>
        <h1>🎮 Spill</h1>
        <div class="sub">
          Velg et spill! Alle er laget for å fungere bra på iPad (touch/knapper), og også på PC med tastatur.
        </div>
      </div>
    </header>

    <div id="continueContainer"></div>

    <div class="filters" id="filterContainer"></div>

    <div class="grid" id="gamesContainer"></div>

    <footer>
      Tips: På iPad kan det hjelpe å legge siden til på hjemskjermen (Del → "Legg til på Hjem-skjerm") for en mer "app"-følelse.
    </footer>
  </div>

  <script>
    // Spill-data med bilde-paths
    const games = [
      {
        name: "Snake",
        emoji: "🐍",
        path: "/spill/snake/",
        image: "assets/snake.png",
        description: "Samle epler og unngå krasj",
        category: "Klassikere"
      },
      {
        name: "Tetris",
        emoji: "🧱",
        path: "/spill/tetris/",
        image: "assets/Tetris.png",
        description: "Roter brikker og lag linjer",
        category: "Klassikere"
      },
      {
        name: "Space Invaders",
        emoji: "👾",
        path: "/spill/space-invaders/",
        image: "assets/spaceinvaders.png",
        description: "Skyt invaderne før de når bunnen",
        category: "Action"
      },
      {
        name: "Breakout",
        emoji: "🏓",
        path: "/spill/breakout/",
        image: "assets/breakout.png",
        description: "Styr plata og knus alle klossene",
        category: "Action"
      },
      {
        name: "Memory",
        emoji: "🧠",
        path: "/spill/memory/",
        image: "assets/memory.png",
        description: "Finn like par med touch",
        category: "Rolig"
      },
      {
        name: "2048",
        emoji: "🔢",
        path: "/spill/2048/",
        image: "assets/2048.png",
        description: "Sveip og slå sammen tall",
        category: "Rolig"
      },
      {
        name: "Kosekaos",
        emoji: "🏡",
        path: "/spill/kosekaos/",
        image: "assets/kosekaos.png",
        description: "Lag figur og pynt rommet ditt",
        category: "Rolig"
      },
      {
        name: "Loopelakk 5000",
        emoji: "🏎️",
        path: "/spill/loopelakk-5000/",
        image: "assets/looplakk5000.png",
        description: "Kun hastighet! Sving og loop",
        category: "Action"
      }
    ];

    const categories = ["Alle", "Rolig", "Action", "Klassikere"];

    // Hent data fra localStorage
    function getLocalStorage() {
      return {
        favorites: JSON.parse(localStorage.getItem("games_favorites") || "[]"),
        lastPlayed: localStorage.getItem("games_lastPlayed"),
        stats: JSON.parse(localStorage.getItem("games_stats") || "{}"),
        filter: localStorage.getItem("games_filter") || "Alle"
      };
    }

    // Lagre data til localStorage
    function saveLocalStorage(data) {
      localStorage.setItem("games_favorites", JSON.stringify(data.favorites));
      localStorage.setItem("games_lastPlayed", data.lastPlayed);
      localStorage.setItem("games_stats", JSON.stringify(data.stats));
      localStorage.setItem("games_filter", data.filter);
    }

    // Formatere dato
    function formatDate(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return "akkurat nå";
      if (diffMins < 60) return `${diffMins}m siden`;
      if (diffHours < 24) return `${diffHours}t siden`;
      if (diffDays === 1) return "i går";
      if (diffDays < 7) return `${diffDays}d siden`;
      
      return date.toLocaleDateString("no-NO", { month: "short", day: "numeric" });
    }

    // Sorter spill (favoritter først, så alfabetisk)
    function sortGames(gamesList, favorites) {
      return gamesList.sort((a, b) => {
        const aFav = favorites.includes(a.path) ? 0 : 1;
        const bFav = favorites.includes(b.path) ? 0 : 1;
        if (aFav !== bFav) return aFav - bFav;
        return a.name.localeCompare(b.name);
      });
    }

    // Filtrer og render spillkort
    function renderGames(filter = "Alle") {
      const data = getLocalStorage();
      const container = document.getElementById("gamesContainer");
      container.innerHTML = "";

      let filtered = games;
      if (filter !== "Alle") {
        filtered = games.filter(g => g.category === filter);
      }

      const sorted = sortGames(filtered, data.favorites);

      sorted.forEach(game => {
        const stat = data.stats[game.path] || {};
        const isFav = data.favorites.includes(game.path);
        const card = document.createElement("section");
        card.className = "card";
        card.innerHTML = `
          <img src="${game.image}" alt="${game.name}" class="card-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22%3E%3Crect fill=%22%23222%22 width=%22300%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23666%22 text-anchor=%22middle%22 dy=%22.3em%22 font-family=%22Arial%22%3E${game.name}%3C/text%3E%3C/svg%3E'">
          <div class="card-body">
            <div class="card-header">
              <div class="card-title">
                <span class="card-title-emoji">${game.emoji}</span>
                <span>${game.name}</span>
              </div>
              <button class="favorite-btn" data-path="${game.path}" title="Favoritt">
                ${isFav ? "⭐" : "☆"}
              </button>
            </div>
            <p>${game.description}</p>
            <div class="card-stats">
              <div class="stat-item">
                <div class="stat-label">Best</div>
                <div class="stat-value">${stat.bestScore || "—"}</div>
              </div>
              <div class="stat-item">
                <div class="stat-label">Sist spilt</div>
                <div class="stat-value">${formatDate(stat.lastPlayedAt)}</div>
              </div>
            </div>
            <div class="play">
              <a href="${game.path}" data-game-path="${game.path}" class="play-btn">▶ ${game.name}</a>
            </div>
          </div>
        `;
        container.appendChild(card);

        // Event-listener for favoritt
        card.querySelector(".favorite-btn").addEventListener("click", (e) => {
          e.preventDefault();
          toggleFavorite(game.path);
          renderGames(filter);
        });

        // Event-listener for "Spill"-knapp
        card.querySelector(".play-btn").addEventListener("click", (e) => {
          e.preventDefault();
          playGame(game.path, game.name);
        });
      });
    }

    // Toggle favoritt
    function toggleFavorite(gamePath) {
      const data = getLocalStorage();
      const idx = data.favorites.indexOf(gamePath);
      if (idx > -1) {
        data.favorites.splice(idx, 1);
      } else {
        data.favorites.push(gamePath);
      }
      saveLocalStorage(data);
    }

    // Spill spill
    function playGame(gamePath, gameName) {
      const data = getLocalStorage();
      const now = new Date().toISOString();
      
      if (!data.stats[gamePath]) {
        data.stats[gamePath] = {};
      }
      data.stats[gamePath].lastPlayedAt = now;
      data.lastPlayed = gamePath;
      
      saveLocalStorage(data);
      window.location.href = gamePath;
    }

    // Render "Fortsett"-blokk
    function renderContinueBlock() {
      const data = getLocalStorage();
      const container = document.getElementById("continueContainer");
      
      if (!data.lastPlayed) {
        container.innerHTML = "";
        return;
      }

      const game = games.find(g => g.path === data.lastPlayed);
      if (!game) {
        container.innerHTML = "";
        return;
      }

      const stat = data.stats[data.lastPlayed] || {};
      const timeStr = formatDate(stat.lastPlayedAt);

      container.innerHTML = `
        <div class="continue-block">
          <div class="left">
            <div>Sist spilt</div>
            <div>${game.emoji} ${game.name} (${timeStr})</div>
          </div>
          <div class="right">
            <a href="${game.path}" data-continue-btn="true" class="continue-play-btn">▶ Fortsett</a>
          </div>
        </div>
      `;

      container.querySelector(".continue-play-btn").addEventListener("click", (e) => {
        e.preventDefault();
        playGame(data.lastPlayed, game.name);
      });
    }

    // Render filter-knapper
    function renderFilters(activeFilter = "Alle") {
      const container = document.getElementById("filterContainer");
      container.innerHTML = "";

      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = `filter-btn ${cat === activeFilter ? "active" : ""}`;
        btn.textContent = cat;
        btn.addEventListener("click", () => {
          const data = getLocalStorage();
          data.filter = cat;
          saveLocalStorage(data);
          renderFilters(cat);
          renderGames(cat);
        });
        container.appendChild(btn);
      });
    }

    // Init
    function init() {
      const data = getLocalStorage();
      renderFilters(data.filter);
      renderGames(data.filter);
      renderContinueBlock();
    }

    init();
  </script>
</body>
</html>
