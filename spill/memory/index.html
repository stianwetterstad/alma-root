<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Memory | Alma.rocks</title>
  <style>
    :root{--bg:#0b1020;--text:#e9ecff;--muted:#a9b1d6;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.12);--btnbg:rgba(255,255,255,.06);--accent:#7aa2f7;--ok:#9ece6a;--danger:#f7768e;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    .ui-topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-start;padding:calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 10px calc(12px + env(safe-area-inset-left));border-bottom:1px solid var(--border);background:rgba(255,255,255,.04);position:sticky;top:0;z-index:20}
    .ui-btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:var(--text);padding:10px 14px;border-radius:12px;font-weight:800;cursor:pointer;user-select:none;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:44px;min-width:44px;touch-action:manipulation}
    .ui-btn:focus-visible,button:focus-visible,.topbar a:focus-visible{outline:3px solid var(--ok);outline-offset:2px}
    .ui-overlay{position:fixed;inset:0;background:rgba(6,9,21,.6);display:flex;align-items:center;justify-content:center;z-index:30;padding:16px}
    .ui-card{background:rgba(11,16,32,.96);border:1px solid var(--border2);border-radius:16px;padding:16px;max-width:340px;width:100%;text-align:center}
    .ui-card h2{margin:0 0 10px 0;font-size:28px}
    .ui-card p{margin:0 0 12px 0;color:var(--muted)}
    .ui-hidden{display:none}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.03);position:sticky;top:0;z-index:10}
    .topbar .left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .topbar a{text-decoration:none;color:var(--text);background:var(--btnbg);border:1px solid var(--border2);padding:8px 12px;border-radius:999px;user-select:none}
    .topbar .label{color:var(--muted);font-size:13px}
    .wrap{width:min(980px,96vw);margin:0 auto;padding:14px;display:grid;grid-template-columns: 1fr minmax(220px,260px);gap:14px}
    .panel{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));border:1px solid var(--border);border-radius:16px;padding:12px}
    h1{margin:0 0 8px 0;font-size:20px}
    .stat{display:flex;justify-content:space-between;color:var(--muted);padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.12)}
    .stat:last-child{border-bottom:none}
    .big{font-weight:800;color:var(--text)}
    .controls{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
    button{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);padding:12px 10px;border-radius:14px;font-weight:700;cursor:pointer;user-select:none;touch-action:manipulation;min-height:44px;min-width:44px}
    button:active{transform:translateY(1px)}
    .primary{background:var(--accent);color:#0b1020;border-color:transparent}
    .danger{background:rgba(247,118,142,.16);border-color:rgba(247,118,142,.35)}
    .grid{display:grid;gap:10px;grid-template-columns: repeat(4, 1fr);}
    .card{
      aspect-ratio: 1 / 1;
      border-radius:16px;
      border:1px solid var(--border2);
      background: rgba(255,255,255,.04);
      display:flex;align-items:center;justify-content:center;
      font-size: clamp(26px, 4vw, 40px);
      cursor:pointer;
      user-select:none;
      touch-action: manipulation;
      position:relative;
      overflow:hidden;
    }
    .card.faceDown::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(400px 200px at 20% 10%, rgba(122,162,247,.25), transparent),
                  linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    }
    .card.matched{outline:2px solid rgba(158,206,106,.45); background: rgba(158,206,106,.10);}
    .hint{color:var(--muted);font-size:13px;line-height:1.35;margin-top:10px}
    @media (max-width: 820px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns: repeat(4, 1fr);}}
    @media (max-width: 420px){.grid{grid-template-columns: repeat(3, 1fr);}}
  </style>
</head>
<body>
  <div class="ui-topbar" role="navigation" aria-label="Spillkontroller">
    <a class="ui-btn" href="/spill/">⬅️ Spillmeny</a>
    <button class="ui-btn" id="uiRestartBtn" type="button">🔄 Start på nytt</button>
    <button class="ui-btn" id="uiPauseBtn" type="button">⏸️ Pause</button>
  </div>

  <div class="ui-overlay ui-hidden" id="pauseOverlay" aria-hidden="true">
    <div class="ui-card">
      <h2>Pauset</h2>
      <button class="ui-btn" id="resumeBtn" type="button">Fortsett</button>
    </div>
  </div>

  <div class="ui-overlay ui-hidden" id="hintOverlay" aria-hidden="true">
    <div class="ui-card">
      <p>Tips: Trykk pa kort for a snu.</p>
      <button class="ui-btn" id="hintOkBtn" type="button">OK</button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="grid" id="grid" aria-label="Memory grid"></div>
    </div>

    <div class="panel">
      <h1>🧠 Memory</h1>
      <div class="stat"><span>Treff</span><span class="big" id="hits">0</span></div>
      <div class="stat"><span>Forsøk</span><span class="big" id="tries">0</span></div>
      <div class="stat"><span>Tid</span><span class="big" id="time">0s</span></div>
      <div class="stat"><span>Status</span><span class="big" id="status">Klar</span></div>

      <div class="controls">
        <button id="easy" class="primary">Enkel (6 par)</button>
        <button id="hard">Vanskelig (10 par)</button>
        <button id="restart" class="danger">Restart</button>
        <button id="peek">Kikk 2s</button>
      </div>

      <div class="hint">
        Trykk to kort. Hvis de matcher, blir de liggende.<br/>
        Tips: “Kikk” hjelper litt hvis det er vanskelig 🙂
      </div>
    </div>
  </div>

<script src="../shared/game-runtime-utils.js"></script>
<script>
(() => {
  const gameId = 'memory';
  const DEBUG = false;
  const debugLog = window.AlmaGameUtils.createDebugLogger(gameId, DEBUG);
  const hintKey = `alma:hintSeen:${gameId}`;
  const gridEl = document.getElementById('grid');
  const hitsEl = document.getElementById('hits');
  const triesEl= document.getElementById('tries');
  const timeEl = document.getElementById('time');
  const statusEl = document.getElementById('status');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const hintOverlay = document.getElementById('hintOverlay');
  const uiPauseBtn = document.getElementById('uiPauseBtn');

  const EMOJIS = ["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯","🐨","🐰","🐙","🦄","🐝","🦋","🐢","🐳","🦖","🦕","🍓","🍉"];

  let pairs = 6;
  let cards = [];
  let first = null, lock = false;
  let hits=0, tries=0;
  let t0 = null, timer = null;
  let elapsedMs = 0;
  let paused = false;

  function softVibrate(ms = 12){ if (navigator.vibrate) navigator.vibrate(ms); }

  function setPaused(value){
    paused = Boolean(value);
    debugLog('pause:set', { paused, lock, first, hits, tries, elapsedMs, hasTimer: Boolean(timer) });
    pauseOverlay.classList.toggle('ui-hidden', !paused);
    pauseOverlay.setAttribute('aria-hidden', paused ? 'false' : 'true');
    uiPauseBtn.textContent = paused ? '▶️ Fortsett' : '⏸️ Pause';
    if (paused && timer){
      elapsedMs = Date.now() - t0;
      timeEl.textContent = Math.floor(elapsedMs/1000) + "s";
      debugLog('timer:pause', { elapsedMs, t0 });
      stopTimer();
    }
    if (!paused && hits < pairs && t0 !== null && !timer) startTimer();
    setStatus(paused ? 'Pauset' : (hits === pairs ? 'Ferdig! 🎉' : 'Spiller'));
  }

  function restartGame(){
    softVibrate(16);
    build();
    setPaused(false);
  }

  function showHintIfNeeded(){
    if (localStorage.getItem(hintKey) === '1') return;
    hintOverlay.classList.remove('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'false');
  }

  const inputLock = window.AlmaGameUtils.createInputLock({
    gameId,
    debug: DEBUG,
    overlayElement: pauseOverlay,
    isLocked: () => paused || lock
  });

  const pauseController = window.AlmaGameUtils.createPauseVisibilityController({
    gameId,
    debug: DEBUG,
    isPaused: () => paused,
    setPaused,
    canPause: () => true
  });

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = (Math.random()*(i+1))|0;
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }

  function setStatus(s){ statusEl.textContent = s; }
  function updateHUD(){
    hitsEl.textContent = String(hits);
    triesEl.textContent= String(tries);
  }

  function startTimer(){
    stopTimer();
    t0 = Date.now() - elapsedMs;
    debugLog('timer:start', { elapsedMs, t0 });
    timer = setInterval(() => {
      elapsedMs = Date.now() - t0;
      timeEl.textContent = Math.floor(elapsedMs/1000) + "s";
    }, 250);
  }
  function stopTimer(){
    if (timer){
      clearInterval(timer);
      timer = null;
      debugLog('timer:stop', { elapsedMs, t0 });
    }
  }

  function build(){
    gridEl.innerHTML = "";
    cards = [];
    first = null; lock = false;
    hits=0; tries=0;
    elapsedMs = 0;
    t0 = null;
    paused = false;
    timeEl.textContent = "0s";
    updateHUD();

    // choose emojis
    const chosen = shuffle(EMOJIS.slice()).slice(0, pairs);
    const deck = shuffle([...chosen, ...chosen].map((v, idx) => ({ id: idx, v, faceDown:true, matched:false })));

    // adjust columns a bit
    const total = deck.length;
    const cols = total <= 12 ? 4 : (total <= 16 ? 4 : 5);
    gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    deck.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = "card faceDown";
      el.dataset.i = String(i);
      el.textContent = ""; // hidden initially
      el.addEventListener('click', () => flip(i));
      deck[i].el = el;
      gridEl.appendChild(el);
    });

    cards = deck;
    setStatus("Klar");
    setPaused(false);
  }

  function render(i){
    const c = cards[i];
    const el = c.el;
    if (c.matched){
      el.classList.remove("faceDown");
      el.classList.add("matched");
      el.textContent = c.v;
      return;
    }
    if (c.faceDown){
      el.classList.add("faceDown");
      el.textContent = "";
    } else {
      el.classList.remove("faceDown");
      el.textContent = c.v;
    }
  }

  function flip(i){
    if (inputLock.blocked('flip', { i })) return;
    const c = cards[i];
    if (c.matched || !c.faceDown) return;
    debugLog('card:click', {
      i,
      first,
      lock,
      paused,
      before: { faceDown: c.faceDown, matched: c.matched }
    });

    if (!timer) startTimer();
    setStatus("Spiller");

    c.faceDown = false;
    render(i);
    debugLog('card:flip', { i, faceDown: c.faceDown, first });

    if (first === null){
      first = i;
      debugLog('card:first:set', { first });
      return;
    }

    tries++;
    updateHUD();

    const a = cards[first], b = c;
    debugLog('compare:start', { firstIndex: first, secondIndex: i, firstValue: a.v, secondValue: b.v });
    if (a.v === b.v){
      a.matched = true;
      b.matched = true;
      hits++;
      updateHUD();
      setStatus("Bra!");
      render(first);
      render(i);
      debugLog('compare:match', { firstIndex: first, secondIndex: i, hits, tries });
      first = null;

      if (hits === pairs){
        setStatus("Ferdig! 🎉");
        stopTimer();
      }
    } else {
      lock = true;
      const firstIndex = first;
      debugLog('lock:on', { firstIndex, secondIndex: i, hits, tries });
      setStatus("Prøv igjen");
      setTimeout(() => {
        a.faceDown = true;
        b.faceDown = true;
        render(firstIndex);
        render(i);
        first = null;
        lock = false;
        debugLog('lock:off', { first, lock });
      }, 650);
    }
  }

  async function peek(){
    if (!cards.length || inputLock.blocked('peek')) return;
    lock = true;
    debugLog('peek:start', { lock });
    cards.forEach((c, i) => { if(!c.matched){ c.faceDown=false; render(i);} });
    await new Promise(r => setTimeout(r, 2000));
    cards.forEach((c, i) => { if(!c.matched){ c.faceDown=true; render(i);} });
    lock = false;
    debugLog('peek:end', { lock });
  }

  document.getElementById('easy').addEventListener('click', () => { pairs=6; build(); });
  document.getElementById('hard').addEventListener('click', () => { pairs=10; build(); });
  document.getElementById('restart').addEventListener('click', build);
  document.getElementById('peek').addEventListener('click', peek);

  document.addEventListener('keydown', (e) => {
    const t = e.target;
    const isTextInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    if (!isTextInput && (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'Enter')) {
      e.preventDefault();
    }
  }, { passive: false });

  document.getElementById('uiPauseBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.toggle('topbar');
  });
  document.getElementById('uiRestartBtn').addEventListener('click', restartGame);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    softVibrate(12);
    pauseController.resume('overlay');
  });
  document.getElementById('hintOkBtn').addEventListener('click', () => {
    softVibrate(12);
    localStorage.setItem(hintKey, '1');
    hintOverlay.classList.add('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'true');
  });

  build();
  showHintIfNeeded();
})();
</script>
</body>
</html>
