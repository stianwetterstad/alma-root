<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Space Invaders | Alma.rocks</title>
  <style>
    :root{ 
      --neon-pink: #ff006e;
      --neon-cyan: #00f5ff;
      --neon-yellow: #ffff00;
      --neon-purple: #b537f2;
      --neon-green: #39ff14;
      --dark-bg: #0a0e27;
      --bg:#0b1020; --panel:#121a33; --text:#e9ecff; --muted:#a9b1d6; --accent:#7aa2f7; --ok:#9ece6a; --danger:#f7768e; 
    }
    body{ margin:0; background: var(--dark-bg); color:var(--text); font-family: 'Orbitron', monospace, system-ui; }
    .ui-topbar{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-start;
      padding:calc(10px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 10px calc(12px + env(safe-area-inset-left));
      border-bottom:3px solid var(--neon-cyan);
      background: rgba(0, 245, 255, 0.08);
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.4);
      position: sticky; top:0; z-index:40;
    }
    .ui-btn{
      border:2px solid var(--neon-cyan);
      background: var(--neon-cyan);
      color: #000;
      padding:10px 14px;
      border-radius:0;
      font-weight:800;
      cursor:pointer;
      user-select:none;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      min-width:44px;
      touch-action:manipulation;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.8);
      font-family: 'Orbitron', monospace;
    }
    .ui-overlay{position:fixed;inset:0;background:rgba(6,9,21,.8);display:flex;align-items:center;justify-content:center;z-index:30;padding:16px}
    .ui-card{background:rgba(11,16,32,.96);border:2px solid var(--neon-pink);border-radius:0;padding:16px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 40px rgba(255,0,110,0.5)}
    .ui-card h2{margin:0 0 10px 0;font-size:28px;color:var(--neon-pink);text-shadow: 0 0 20px var(--neon-pink)}
    .ui-card p{margin:0 0 12px 0;color:var(--neon-cyan);text-transform:uppercase;letter-spacing:1px}
    .ui-hidden{display:none}
    .topbar{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      padding:12px 14px; border-bottom:3px solid var(--neon-cyan);
      background: rgba(0, 245, 255, 0.08);
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
      position: sticky; top:0;
    }
    .topbar a{
      text-decoration:none; color:#000;
      background: var(--neon-cyan);
      border:2px solid var(--neon-cyan);
      padding:8px 12px; border-radius:0;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:1px;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
    }
    .wrap{
      display:grid;
      grid-template-columns: 1fr minmax(220px, 260px);
      gap:14px;
      padding:14px;
      width: min(980px, 96vw);
      margin: 0 auto;
      align-items:start;
    }
    .panel{
      background: rgba(255,0,110, 0.06);
      border:2px solid var(--neon-pink);
      border-radius:0;
      padding:12px;
      box-shadow: 0 0 30px rgba(255,0,110, 0.3);
    }
    canvas{
      width:100%;
      height:auto;
      display:block;
      background: #060915;
      border-radius: 0;
      border: 3px solid var(--neon-green);
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.6);
    }
    h1{ margin:0 0 8px 0; font-size: 20px; color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); text-transform: uppercase; letter-spacing: 2px; }
    .stat{ display:flex; justify-content:space-between; color:var(--neon-cyan); padding:6px 0; border-bottom:1px dashed rgba(0, 245, 255, 0.3); }
    .stat:last-child{ border-bottom:none; }
    .big{ font-weight:800; color:var(--neon-yellow); font-size:1.2em; }
    .hint{ color:var(--neon-cyan); font-size: 13px; line-height:1.35; margin-top:10px;text-transform:uppercase;letter-spacing:0.5px;}
    .controls{
      display:grid; grid-template-columns: repeat(3, 1fr);
      gap:10px; margin-top: 10px;
    }
    button{
      border:2px solid var(--neon-cyan);
      background: rgba(0, 245, 255, 0.1);
      color: var(--neon-cyan);
      padding:12px 10px;
      border-radius: 0;
      font-weight:700;
      cursor:pointer;
      user-select:none;
      min-height:44px;
      min-width:44px;
      touch-action:manipulation;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
      font-family: 'Orbitron', monospace;
    }
    .ui-btn:focus-visible,button:focus-visible,.topbar a:focus-visible{outline:3px solid var(--neon-yellow);outline-offset:2px}
    button:active{ transform: translateY(1px); }
    .primary{ background: var(--neon-green); color:#000; border-color: var(--neon-green); box-shadow: 0 0 25px rgba(57, 255, 20, 0.8); }
    .danger{ background: rgba(255,0,110,.16); border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255,0,110, 0.5); }
    kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px; padding:2px 6px;
      border:1px solid var(--neon-cyan);
      border-bottom-width:2px;
      border-radius:0; background: rgba(0, 245, 255, 0.1);
      color:var(--neon-cyan);
    }
    @media (max-width: 820px){
      .wrap{ grid-template-columns: 1fr; }
    }
  </style>
  <script src="/analytics-config.js"></script>
  <script defer src="/assets/ga4.js"></script>
</head>
<body>
  <div class="ui-topbar" role="navigation" aria-label="Spillkontroller">
    <a class="ui-btn" href="/spill/">⬅️ Spillmeny</a>
    <button class="ui-btn" id="uiRestartBtn" type="button">🔄 Start på nytt</button>
    <button class="ui-btn" id="uiPauseBtn" type="button">⏸️ Pause</button>
  </div>

  <div class="ui-overlay ui-hidden" id="pauseOverlay" aria-hidden="true">
    <div class="ui-card">
      <h2>Pauset</h2>
      <button class="ui-btn" id="resumeBtn" type="button">Fortsett</button>
    </div>
  </div>

  <div class="ui-overlay ui-hidden" id="hintOverlay" aria-hidden="true">
    <div class="ui-card">
      <p>Tips: Venstre/hoyre for a flytte, trykk for a skyte.</p>
      <button class="ui-btn" id="hintOkBtn" type="button">OK</button>
    </div>
  </div>

  <div class="wrap">
    <div class="panel">
      <canvas id="game" width="480" height="640" aria-label="Space Invaders canvas"></canvas>
    </div>

    <div class="panel">
      <h1>👾 Space Invaders</h1>

      <div class="stat"><span>Score</span><span class="big" id="score">0</span></div>
      <div class="stat"><span>Liv</span><span class="big" id="lives">3</span></div>
      <div class="stat"><span>Nivå</span><span class="big" id="level">1</span></div>
      <div class="stat"><span>Status</span><span class="big" id="status">Klar</span></div>

      <div class="controls">
        <button id="left">←</button>
        <button id="shoot" class="primary">Skyt</button>
        <button id="right">→</button>
        <button id="pause" class="danger">Pause</button>
        <button id="restart" class="primary">Restart</button>
        <button id="mute">🔊</button>
      </div>

      <div class="hint">
        Tastatur: <kbd>←</kbd><kbd>→</kbd> flytt, <kbd>Space</kbd> skyt, <kbd>P</kbd> pause, <kbd>R</kbd> restart.
      </div>
    </div>
  </div>

<script src="../shared/game-runtime-utils.js"></script>
<script>
(() => {
  const gameId = 'space-invaders';
  const DEBUG = false;
  const hintKey = `alma:hintSeen:${gameId}`;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');
  const statusEl = document.getElementById('status');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const hintOverlay = document.getElementById('hintOverlay');
  const uiPauseBtn = document.getElementById('uiPauseBtn');

  let muted = false;

  // Simple beep (no external assets)
  function beep(freq=440, ms=60, vol=0.05){
    if (muted) return;
    try{
      const ac = beep.ac || (beep.ac = new (window.AudioContext || window.webkitAudioContext)());
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.frequency.value = freq;
      o.type = 'square';
      g.gain.value = vol;
      o.connect(g); g.connect(ac.destination);
      o.start();
      setTimeout(() => { o.stop(); }, ms);
    } catch { /* ignore */ }
  }

  // Game state
  let score = 0;
  let lives = 3;
  let level = 1;
  let paused = false;
  let gameOver = false;

  function softVibrate(ms = 12){ if (navigator.vibrate) navigator.vibrate(ms); }

  function setPaused(value){
    paused = Boolean(value);
    pauseOverlay.classList.toggle('ui-hidden', !paused);
    pauseOverlay.setAttribute('aria-hidden', paused ? 'false' : 'true');
    uiPauseBtn.textContent = paused ? '▶️ Fortsett' : '⏸️ Pause';
    if (!gameOver) statusEl.textContent = paused ? 'Pauset' : 'Spiller';
  }

  function restartGame(){
    softVibrate(16);
    reset();
  }

  function showHintIfNeeded(){
    if (localStorage.getItem(hintKey) === '1') return;
    hintOverlay.classList.remove('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'false');
  }

  const inputLock = window.AlmaGameUtils.createInputLock({
    gameId,
    debug: DEBUG,
    overlayElement: pauseOverlay,
    isLocked: () => paused || gameOver
  });

  const pauseController = window.AlmaGameUtils.createPauseVisibilityController({
    gameId,
    debug: DEBUG,
    isPaused: () => paused,
    setPaused,
    canPause: () => !gameOver
  });

  const keys = { left:false, right:false, shoot:false };

  const player = {
    w: 42, h: 16,
    x: canvas.width/2 - 21,
    y: canvas.height - 40,
    speed: 5,
    cooldown: 0
  };

  const bullets = [];
  const enemyBullets = [];

  let invaders = [];
  let invDir = 1; // 1 right, -1 left
  let invSpeed = 0.5;
  let invStepDown = 14;
  let invShootTimer = 0;

  function createInvaders(){
    invaders = [];
    const rows = 5;
    const cols = 10;
    const pad = 10;
    const startX = 50;
    const startY = 80;
    const iw = 26, ih = 18;

    for (let r=0; r<rows; r++){
      for (let c=0; c<cols; c++){
        invaders.push({
          x: startX + c*(iw+pad),
          y: startY + r*(ih+pad),
          w: iw, h: ih,
          alive: true,
          type: r // just for scoring
        });
      }
    }
    invDir = 1;
    invSpeed = 0.55 + (level-1)*0.10;
    invShootTimer = 0;
  }

  function reset(){
    score = 0;
    lives = 3;
    level = 1;
    paused = false;
    gameOver = false;

    bullets.length = 0;
    enemyBullets.length = 0;

    player.x = canvas.width/2 - player.w/2;
    player.cooldown = 0;

    createInvaders();
    updateHUD();
    setPaused(false);
  }

  function updateHUD(){
    scoreEl.textContent = String(score);
    livesEl.textContent = String(lives);
    levelEl.textContent = String(level);
  }

  function rectsOverlap(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function shoot(){
    if (player.cooldown > 0) return;
    bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w:4, h:10, vy:-7 });
    player.cooldown = 14;
    beep(880, 50, 0.04);
  }

  function enemyShoot(){
    // pick a random alive invader near bottom of its column
    // only allow stronger aliens (type 3-4) to shoot
    const alive = invaders.filter(i => i.alive && (i.type === 3 || i.type === 4));
    if (!alive.length) return;

    // group by column approximate (x)
    const byCol = new Map();
    for (const inv of alive){
      const key = Math.round(inv.x / 10);
      const cur = byCol.get(key);
      if (!cur || inv.y > cur.y) byCol.set(key, inv);
    }
    const shooters = [...byCol.values()];
    if (!shooters.length) return;
    
    const s = shooters[(Math.random() * shooters.length) | 0];
    
    // different bullet colors based on alien type
    const bulletColor = s.type === 4 ? '#ff1493' : '#ff69b4'; // deep pink vs hot pink for visual distinction
    const bulletVy = s.type === 4 ? 4.8 + (level-1)*0.4 : 4.2 + (level-1)*0.4; // type 4 shoots faster
    
    enemyBullets.push({ 
      x: s.x + s.w/2 - 2, 
      y: s.y + s.h, 
      w: 4, 
      h: 10, 
      vy: bulletVy,
      color: bulletColor,
      type: s.type
    });
  }

  function step(){
    if (paused || gameOver) return;

    // player move
    if (keys.left) player.x -= player.speed;
    if (keys.right) player.x += player.speed;
    player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));
    if (player.cooldown > 0) player.cooldown--;

    // shooting
    if (keys.shoot) shoot();

    // bullets update
    for (let i=bullets.length-1; i>=0; i--){
      bullets[i].y += bullets[i].vy;
      if (bullets[i].y < -20) bullets.splice(i,1);
    }
    for (let i=enemyBullets.length-1; i>=0; i--){
      enemyBullets[i].y += enemyBullets[i].vy;
      if (enemyBullets[i].y > canvas.height+30) enemyBullets.splice(i,1);
    }

    // invaders movement
    let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const inv of invaders){
      if (!inv.alive) continue;
      inv.x += invDir * invSpeed;
      minX = Math.min(minX, inv.x);
      maxX = Math.max(maxX, inv.x + inv.w);
      maxY = Math.max(maxY, inv.y + inv.h);
    }

    // edge check
    if (minX < 10 || maxX > canvas.width - 10){
      invDir *= -1;
      for (const inv of invaders){
        if (inv.alive) inv.y += invStepDown;
      }
      beep(220, 40, 0.03);
    }

    // lose if invaders reach player line
    if (maxY > player.y - 10){
      lives = 0;
      endGame(false);
      return;
    }

    // invader shooting
    invShootTimer += 1;
    const shootEvery = Math.max(35, 85 - level*6);
    if (invShootTimer >= shootEvery){
      invShootTimer = 0;
      enemyShoot();
    }

    // collisions: player bullets vs invaders
    for (let b=bullets.length-1; b>=0; b--){
      const bullet = bullets[b];
      let hit = false;
      for (const inv of invaders){
        if (!inv.alive) continue;
        if (rectsOverlap(bullet, inv)){
          inv.alive = false;
          bullets.splice(b,1);
          hit = true;

          // scoring
          const base = [50,40,30,20,10][inv.type] || 10;
          score += base;
          beep(660, 45, 0.04);
          break;
        }
      }
      if (hit) updateHUD();
    }

    // collisions: enemy bullets vs player
    for (let b=enemyBullets.length-1; b>=0; b--){
      const bullet = enemyBullets[b];
      if (rectsOverlap(bullet, player)){
        enemyBullets.splice(b,1);
        lives--;
        beep(140, 120, 0.05);
        updateHUD();
        if (lives <= 0){
          endGame(false);
          return;
        }
      }
    }

    // next level
    if (invaders.every(i => !i.alive)){
      level++;
      updateHUD();
      bullets.length = 0;
      enemyBullets.length = 0;
      createInvaders();
      statusEl.textContent = 'Nivå ' + level;
      beep(990, 120, 0.05);
    }
  }

  function endGame(win){
    gameOver = true;
    setPaused(true);
    statusEl.textContent = win ? 'Du vant! (R)' : 'Game Over (R)';
  }

  function draw(){
    // background
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#0a0e27');
    grad.addColorStop(1, '#0f1535');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // stars with glow
    ctx.fillStyle = 'rgba(255,255,255,.15)';
    ctx.shadowColor = 'rgba(0, 245, 255, 0.3)';
    ctx.shadowBlur = 4;
    for (let i=0; i<40; i++){
      const x = (i*97) % canvas.width;
      const y = (i*173 + (Date.now()/30)) % canvas.height;
      ctx.fillRect(x, y, 2, 2);
    }
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // player (cyan green)
    ctx.fillStyle = '#39ff14';
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 12;
    roundRect(player.x, player.y, player.w, player.h, 6, true);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // bullets (yellow)
    ctx.fillStyle = '#ffff00';
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 8;
    bullets.forEach(b => {
      ctx.fillRect(b.x, b.y, b.w, b.h);
    });
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // enemy bullets (different colors by alien type)
    enemyBullets.forEach(b => {
      const color = b.color || '#ff006e'; // fallback to original pink
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.fillRect(b.x, b.y, b.w, b.h);
    });
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // invaders (different designs by type)
    for (const inv of invaders){
      if (!inv.alive) continue;
      
      // types 3-4 are the shooters - draw them as detailed aliens
      const isShooter = inv.type === 3 || inv.type === 4;
      const isBoss = inv.type === 4;
      
      if (isShooter) {
        // Detailed alien for shooters
        ctx.fillStyle = isBoss ? '#ff69b4' : '#00f5ff'; // hot pink for boss shooters, cyan for regular shooters
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = isBoss ? 18 : 12;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        
        const cx = inv.x + inv.w/2;
        const cy = inv.y + inv.h/2;
        const scale = inv.w / 26;
        
        // Head (circle)
        ctx.beginPath();
        ctx.arc(cx, cy - 3*scale, 7*scale, 0, Math.PI*2);
        ctx.fill();
        
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(cx - 4*scale, cy - 4*scale, 2*scale, 2*scale);
        ctx.fillRect(cx + 2*scale, cy - 4*scale, 2*scale, 2*scale);
        
        // Body (wider base)
        ctx.fillStyle = isBoss ? '#ff69b4' : '#00f5ff';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = isBoss ? 18 : 12;
        ctx.fillRect(cx - 8*scale, cy + 0*scale, 16*scale, 6*scale);
        
        // Tentacles/legs on each side
        ctx.fillRect(cx - 10*scale, cy + 4*scale, 3*scale, 4*scale); // left leg
        ctx.fillRect(cx + 7*scale, cy + 4*scale, 3*scale, 4*scale);  // right leg
        
        // Antenna for boss shooters
        if (isBoss) {
          ctx.strokeStyle = isBoss ? '#ff69b4' : '#00f5ff';
          ctx.lineWidth = 2;
          ctx.shadowColor = ctx.strokeStyle;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(cx - 4*scale, cy - 7*scale);
          ctx.lineTo(cx - 6*scale, cy - 10*scale);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(cx + 4*scale, cy - 7*scale);
          ctx.lineTo(cx + 6*scale, cy - 10*scale);
          ctx.stroke();
        }
      } else {
        // Simple alien for weaker types
        const glowIntensity = 8;
        
        ctx.fillStyle = '#00f5ff';
        ctx.shadowColor = '#00f5ff';
        ctx.shadowBlur = glowIntensity;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        roundRect(inv.x, inv.y, inv.w, inv.h, 4, true);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        
        // Simple eyes for weaker aliens
        ctx.fillStyle = 'rgba(0,0,0,.4)';
        ctx.fillRect(inv.x+5, inv.y+4, 3, 3);
        ctx.fillRect(inv.x+inv.w-8, inv.y+4, 3, 3);
      }
    }

    // overlay text
    if (paused){
      ctx.fillStyle = 'rgba(0,0,0,.35)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#ffff00';
      ctx.font = '700 26px Orbitron, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(gameOver ? 'GAME OVER' : 'PAUSE', canvas.width/2, canvas.height/2 - 8);
      ctx.font = '14px Orbitron, monospace';
      ctx.fillStyle = 'rgba(0, 245, 255, 0.85)';
      ctx.fillText('Trykk P for å fortsette • R for restart', canvas.width/2, canvas.height/2 + 20);
    }
  }

  function roundRect(x, y, w, h, r, fill){
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
    if (fill) ctx.fill();
  }

  function loop(){
    step();
    draw();
    requestAnimationFrame(loop);
  }

  // keyboard input
  document.addEventListener('keydown', (e) => {
    const t = e.target;
    const isTextInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    if (!isTextInput && (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Space' || e.code === 'Enter')) {
      e.preventDefault();
    }
    if (e.code === 'KeyP'){
      if (gameOver) return;
      pauseController.toggle('key-p');
      return;
    }
    if (e.code === 'KeyR'){ reset(); return; }
    if (inputLock.blocked('keydown', { code: e.code })) return;
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space') keys.shoot = true;
  }, { passive: false });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') keys.shoot = false;
  });

  // buttons (touch/mouse)
  function resetHoldInput(){
    keys.left = false;
    keys.right = false;
    keys.shoot = false;
  }

  const bindHold = (btn, on, off) => {
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (inputLock.blocked('pointerdown')) return;
      on();
    });
    btn.addEventListener('pointerup', off);
    btn.addEventListener('pointercancel', off);
    btn.addEventListener('pointerleave', off);
  };

  bindHold(document.getElementById('left'), () => keys.left = true, () => keys.left = false);
  bindHold(document.getElementById('right'), () => keys.right = true, () => keys.right = false);
  bindHold(document.getElementById('shoot'), () => keys.shoot = true, () => keys.shoot = false);
  window.addEventListener('pointerup', resetHoldInput);
  window.addEventListener('pointercancel', resetHoldInput);

  document.getElementById('pause').addEventListener('click', () => {
    if (gameOver) return;
    pauseController.toggle('panel-button');
  });
  document.getElementById('restart').addEventListener('click', () => reset());
  document.getElementById('mute').addEventListener('click', (e) => {
    muted = !muted;
    e.currentTarget.textContent = muted ? '🔇' : '🔊';
  });

  document.getElementById('uiPauseBtn').addEventListener('click', () => {
    if (gameOver) return;
    softVibrate(12);
    pauseController.toggle('topbar');
  });
  document.getElementById('uiRestartBtn').addEventListener('click', restartGame);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    softVibrate(12);
    if (gameOver) {
      reset();
    } else {
      pauseController.resume('overlay');
    }
  });
  document.getElementById('hintOkBtn').addEventListener('click', () => {
    softVibrate(12);
    localStorage.setItem(hintKey, '1');
    hintOverlay.classList.add('ui-hidden');
    hintOverlay.setAttribute('aria-hidden', 'true');
  });

  // init
  reset();
  showHintIfNeeded();
  loop();
})();
</script>
</body>
</html>
